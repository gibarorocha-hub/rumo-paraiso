<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico ULTRA</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }

button {
 margin:5px;
 padding:10px;
 width:90%;
 max-width:400px;
 border-radius:8px;
 border:none;
}

.locked{background:#444;color:#888;}
.correct{background:green;}
.wrong{background:red;}
.admin{background:orange;}

.progress-bar{
width:90%;max-width:400px;background:#333;border-radius:10px;margin:10px auto;
}
.progress{height:20px;background:limegreen;border-radius:10px;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>
<button onclick="loginAdmin()">Login Admin</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<audio id="somAcerto" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="somErro" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "Pmbm5BqKNRXu3gXI4EPj5LrddNC3";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid=null, dados={}, combo=0;

// LOGIN ADMIN
window.loginAdmin = async function(){
let email=prompt("Email:");
let senha=prompt("Senha:");
try{
let cred=await signInWithEmailAndPassword(auth,email,senha);
uid=cred.user.uid;
alert("ADMIN ATIVO");
entrar();
}catch{alert("Erro login")}
}

// LOGIN ANÔNIMO
const user = await signInAnonymously(auth);
if(!uid) uid=user.user.uid;

// SALVAR
async function salvar(){
await setDoc(doc(db,"usuarios",uid),dados);
}

// ENTRAR
window.entrar = async function(){

let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let ref=doc(db,"usuarios",uid);
let snap=await getDoc(ref);

if(snap.exists()){
dados=snap.data();
}else{
dados={nome,xp:0,nivel:1,progresso:{},conquistas:[]};
}

await salvar();

menu.innerHTML=`
<h3>${dados.nome}</h3>
<p>⭐ Nível ${dados.nivel} | XP ${dados.xp}</p>

<div class="progress-bar">
<div class="progress" style="width:${(dados.xp/(dados.nivel*100))*100}%"></div>
</div>

${[...Array(12)].map((_,i)=>{
let t="t"+(i+1);
let prev="t"+i;
return `<button onclick="start('${t}')" ${(i>0 && (dados.progresso[prev]||0)<80)?'class="locked"':''}>Lição ${i+1}</button>`;
}).join("")}

${uid===ADMIN_UID ? `<button class="admin" onclick="painelAdmin()">👑 ADMIN</button>` : ""}
`;

carregarRanking();
}

// 🔥 PERGUNTAS

let temas = {

t1:[

["Segundo a introdução da lição, por que muitas pessoas procuram a Bíblia?", 
["Por tradição religiosa","Porque ela responde às perguntas mais importantes da vida","Porque é obrigatória"],1],

["Qual dos assuntos abaixo a Bíblia ajuda a entender, segundo o início da lição?", 
["Somente religião","Vida, sofrimento e futuro","Apenas história antiga"],1],

["De acordo com a lição, preocupar-se com sustento e família mostra que:", 
["São questões espirituais irrelevantes","São preocupações reais do dia a dia","São falta de fé"],1],

["Segundo o parágrafo 1, qual dessas perguntas a Bíblia responde?", 
["Como enriquecer rápido","Qual é o objetivo da vida","Como evitar envelhecer"],1],

["Por que não é errado fazer perguntas como 'por que sofremos'?", 
["Porque são comuns e importantes","Porque Deus exige","Porque não têm resposta"],0],

["Segundo o parágrafo 2, a Bíblia ajuda no dia a dia principalmente:", 
["Com regras rígidas","Com conselhos práticos para viver melhor","Com previsões políticas"],1],

["O texto de 2 Timóteo 3:16 mostra que a Bíblia é:", 
["Apenas simbólica","Proveitosa para ensinar","Difícil de entender"],1],

["A comparação com a lanterna em Salmo 119:105 ensina que a Bíblia:", 
["Ilumina decisões e direção na vida","Serve apenas para leitura","É opcional"],0],

["No vídeo da professora, o principal benefício de estudar a Bíblia foi:", 
["Ganhar dinheiro","Encontrar respostas para suas dúvidas","Aprender história"],1],

["Segundo Mateus 7:7, o que a Bíblia incentiva?", 
["Esperar respostas sem agir","Buscar respostas ativamente","Ignorar dúvidas"],1]

]

};

// outras lições ainda bloqueadas
for(let i=2;i<=12;i++) temas["t"+i]=temas.t1;

// QUIZ
let lista=[], atual=0, acertos=0, temaAtual="";

window.start=function(t){
temaAtual=t;
lista=temas[t];
atual=0;
acertos=0;
combo=0;
menu.innerHTML="";
load();
}

function load(){
let q=lista[atual];
quiz.innerHTML=`<h3>${q[0]}</h3><p>🔥 Combo: ${combo}</p>`;
q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i},this)">${op}</button>`;
});
}

window.resp=async function(i,btn){

if(i===lista[atual][2]){
combo++;
dados.xp+=10+(combo*2);
acertos++;
btn.classList.add("correct");
somAcerto.play();
}else{
combo=0;
dados.xp=Math.max(0,dados.xp-5);
btn.classList.add("wrong");
somErro.play();
}

atual++;

setTimeout(async()=>{
if(atual<lista.length){
load();
}else{

let pct=Math.round((acertos/lista.length)*100);
dados.progresso[temaAtual]=pct;

if(dados.xp>=dados.nivel*100){
dados.xp=0;
dados.nivel++;
alert("🔥 SUBIU DE NÍVEL!");
}

await salvar();

quiz.innerHTML=`<h2>${pct}%</h2><button onclick="entrar()">Menu</button>`;
}
},500);
}

// RANKING
async function carregarRanking(){
let snap=await getDocs(collection(db,"usuarios"));
let lista=[];
snap.forEach(d=>lista.push(d.data()));
lista.sort((a,b)=>b.xp-a.xp);

ranking.innerHTML="<h3>🏆 Ranking</h3>"+lista.slice(0,5).map(u=>`<p>${u.nome} - ${u.xp}</p>`).join("");
}

// ADMIN
window.painelAdmin=async function(){
let snap=await getDocs(collection(db,"usuarios"));
let html="<h3>👑 ADMIN</h3>";

snap.forEach(docSnap=>{
let u=docSnap.data();
let id=docSnap.id;

html+=`
<div>
<b>${u.nome}</b><br>
XP:${u.xp} | Nv:${u.nivel}<br>
Progresso:${JSON.stringify(u.progresso)}<br>
<button onclick="darXP('${id}')">+XP</button>
</div>`;
});

admin.innerHTML=html;
}

window.darXP=async function(id){
await updateDoc(doc(db,"usuarios",id),{xp:100});
painelAdmin();
}

</script>

</body>
</html>
