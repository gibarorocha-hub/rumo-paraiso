<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumo ao Paraíso</title>
    <style>
        body { font-family: Arial; text-align:center; background:#111; color:#fff; padding: 20px; }
        button { width: 90%; max-width: 400px; margin: 10px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        input { padding: 15px; border-radius: 8px; width: 80%; max-width: 370px; margin-bottom: 10px; border: none; }
        .locked { background: #444 !important; color: #888; cursor: not-allowed; }
        .quiz-btn { background: #2196F3; color: white; }
        .correct { background: #4CAF50 !important; }
        .wrong { background: #F44336 !important; }
        #ranking { background: #222; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #444; }
        .rank-item { border-bottom: 1px solid #333; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <h1>📖 Rumo ao Paraíso</h1>

    <div id="loginSection">
        <input id="nome" placeholder="Digite seu nome...">
        <button onclick="entrar()" style="background: #4CAF50; color: white;">Entrar</button>
    </div>

    <div id="menu" style="display:none;"></div>
    <div id="quiz" style="display:none;"></div>
    <div id="ranking" style="display:none;"></div>

    <audio id="somAcerto" src="Aplauso.mp3"></audio>
    <audio id="somErro" src="Vaia.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://gstatic.com";
    import { getAuth, signInAnonymously } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
        authDomain: "://firebaseapp.com",
        projectId: "quiz-biblico-e1362",
        storageBucket: "quiz-biblico-e1362.firebasestorage.app",
        messagingSenderId: "381226315263",
        appId: "1:381226315263:web:0460f78509890632b5003c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid, jogadorNome = "", dados = {};

    const menuDiv = document.getElementById("menu");
    const quizDiv = document.getElementById("quiz");
    const rankingDiv = document.getElementById("ranking");

    const temas = {
        t1:[["Segundo João 17:3, o que é essencial?",["Conhecer Deus","Religião","Obras"],0],["Nome de Deus?",["Importante","Não importa","Tradição"],0],["(Vídeo) mudança veio de?",["Aplicar Bíblia","Sorte","Pessoas"],0],["Conhecer Deus exige?",["Esforço","Sorte","Nada"],0],["Só acreditar basta?",["Sim","Não","Depende"],1],["Mudança mostra?",["Conhecimento real","Nada","Religião"],0],["Jesus revelou?",["Deus","Homens","Anjos"],0],["Pegadinha: automático?",["Sim","Não","Talvez"],1],["Aplicar ensinos?",["Aproxima","Nada","Confunde"],0],["Ignorar Deus?",["Problemas","Nada","Sucesso"],0]],
        t2:[["Bíblia vem de?",["Deus","Homens","Reis"],0],["Serve para?",["Ensinar","Confundir","Entreter"],0],["(Vídeo) prova?",["Profecias","Popularidade","Tradição"],0],["Corrige?",["Sim","Não","Pouco"],0],["Ler?",["Sim","Não","Talvez"],0],["Origem?",["Divina","Humana","Mista"],0],["Erra?",["Não","Sim","Às vezes"],0],["Pegadinha: só líderes?",["Sim","Não","Depende"],1],["Ignorar?",["Problemas","Nada","Sucesso"],0],["Ajuda decisões?",["Sim","Não","Pouco"],0]],
        t3:[["Deus quer?",["Felicidade","Riqueza","Fama"],0],["(Vídeo) felicidade?",["Aplicar Bíblia","Dinheiro","Status"],0],["Deus se importa?",["Sim","Não","Pouco"],0],["Depende de?",["Deus","Sorte","Dinheiro"],0],["Pegadinha: sem problemas?",["Sim","Não","Talvez"],1],["Deus ajuda?",["Sim","Não","Pouco"],0],["Confiar traz?",["Paz","Nada","Confusão"],0],["Vida sem Deus?",["Vazio","Perfeita","Nada"],0],["Alegria?",["Espiritual","Material","Momentânea"],0],["Aplicar ensinos?",["Felicidade","Nada","Problemas"],0]],
        t4:[["Sofrimento vem de?",["Humanos/Satanás","Deus","Natureza"],0],["(Vídeo) esperança?",["Promessas","Dinheiro","Tempo"],0],["Vai acabar?",["Sim","Não","Talvez"],0],["Deus causa?",["Não","Sim","Sempre"],0],["Pegadinha: Deus testa?",["Sim","Não","Depende"],1],["Esperança?",["Real","Falsa","Fraca"],0],["Promessa?",["Fim dor","Nada","Mais dor"],0],["Reagir?",["Confiar","Desistir","Ignorar"],0],["Prova?",["Precisamos Deus","Nada","Erro"],0],["Futuro?",["Melhor","Igual","Pior"],0]],
        t5:[["Jesus é?",["Filho de Deus","Deus","Profeta"],0],["(Vídeo) ensinou?",["Amor","Guerra","Dinheiro"],0],["Veio para?",["Salvar","Dominar","Punir"],0],["Exemplo?",["Obediência","Orgulho","Força"],0],["Pegadinha: Jesus é Deus?",["Sim","Não","Depende"],1],["Imitar?",["Sim","Não","Pouco"],0],["Ajudava?",["Sim","Não","Às vezes"],0],["Falou sobre?",["Amor","Ódio","Riqueza"],0],["Seguir leva?",["Vida","Nada","Problemas"],0],["Morreu por?",["Nós","Ele","Ninguém"],0]],
        t6:[["Fé é?",["Confiança","Sentimento","Medo"],0],["(Vídeo) cresce?",["Estudo","Sorte","Dinheiro"],0],["Sem ação?",["Morta","Forte","Completa"],0],["Confiar em?",["Deus","Homens","Nada"],0],["Pegadinha: sem prova?",["Sim","Não","Sempre"],1],["Cresce com?",["Prática","Tempo","Acaso"],0],["Ajuda?",["Decisões","Nada","Problemas"],0],["Recompensa?",["Sim","Não","Pouco"],0],["Gera?",["Ação","Nada","Dúvida"],0],["Sem fé?",["Não agrada","Agrada","Talvez"],0]],
        t7:[["Oração é?",["Comunicação com Deus","Ritual","Repetição"],0],["(Vídeo) oração eficaz?",["Sincera","Decorada","Rápida"],0],["Deus ouve?",["Sim","Não","Pouco"],0],["Devemos orar?",["Sempre","Nunca","Às vezes"],0],["Pegadinha: repetir?",["Sim","Não","Depende"],1],["Orar ajuda?",["Aproxima Deus","Nada","Confunde"],0],["Deus responde?",["Sim","Não","Nunca"],0],["Orar por?",["Coisas certas","Qualquer coisa","Nada"],0],["Fé + oração?",["Fortalece","Nada","Diminui"],0],["Sem oração?",["Enfraquece fé","Nada","Melhora"],0]],
        t8:[["Reuniões servem?",["Aprender","Social","Perder tempo"],0],["(Vídeo) benefício?",["Fortalece fé","Nada","Diversão"],0],["Devemos frequentar?",["Sim","Não","Pouco"],0],["Ajuda espiritual?",["Sim","Não","Pouco"],0],["Pegadinha: posso sozinho?",["Sim","Não","Depende"],1],["Companhia espiritual?",["Importante","Não importa","Evitar"],0],["Aprendizado vem de?",["Ensino bíblico","Opiniões","Nada"],0],["Incentivo?",["Sim","Não","Pouco"],0],["Reuniões aproximam?",["De Deus","Nada","Pessoas só"],0],["Faltar sempre?",["Prejudica","Nada","Ajuda"],0]],
        t9:[["Obediência é?",["Importante","Opcional","Pesada"],0],["(Vídeo) resultado?",["Bênçãos","Nada","Problemas"],0],["Deus espera?",["Obediência","Perfeição","Nada"],0],["Obedecer mostra?",["Amor","Medo","Religião"],0],["Pegadinha: obedecer só quando convém?",["Sim","Não","Talvez"],1],["Resultado?",["Problemas","Nada","Sucesso"],0],["Protege?",["Sim","Não","Pouco"],0],["Deus disciplina?",["Sim","Não","Nunca"],0],["Leva a?",["Vida","Nada","Problemas"],0],["Amor envolve?",["Obedecer","Sentir","Falar"],0]],
        t10:[["Moral bíblica?",["Importante","Antiga","Opcional"],0],["(Vídeo) pureza?",["Paz","Nada","Problemas"],0],["Evitar?",["Imoralidade","Nada","Tudo"],0],["Pensamentos contam?",["Sim","Não","Pouco"],0],["Pegadinha: só ações?",["Sim","Não","Depende"],1],["Protege?",["Sim","Não","Pouco"],0],["Deus vê?",["Tudo","Nada","Pouco"],0],["Escolhas afetam?",["Vida","Nada","Pouco"],0],["Leva a?",["Felicidade","Nada","Problemas"],0],["Ignorar?",["Prejudica","Nada","Ajuda"],0]],
        t11:[["Amor ao próximo?",["Essencial","Opcional","Difícil"],0],["(Vídeo) amar envolve?",["Ação","Palavras","Nada"],0],["Perdoar?",["Importante","Opcional","Difícil"],0],["Deus perdoa?",["Sim","Não","Pouco"],0],["Pegadinha: mágoa ok?",["Sim","Não","Depende"],1],["Amor une?",["Sim","Não","Pouco"],0],["Ajudar?",["Sim","Não","Talvez"],0],["Verdadeiro?",["Sacrifício","Palavras","Nada"],0],["Ódio leva?",["Problemas","Nada","Vitória"],0],["Amor agrada?",["Deus","Homens","Ninguém"],0]],
        t12:[["Futuro prometido?",["Paraíso","Nada","Destruição"],0],["(Vídeo) esperança?",["Vida eterna","Nada","Riqueza"],0],["Deus vai agir?",["Sim","Não","Talvez"],0],["Terra será?",["Melhor","Igual","Pior"],0],["Pegadinha: só alguns?",["Sim","Não","Depende"],1],["Vida eterna?",["Possível","Impossível","Lenda"],0],["Preparação?",["Aprender","Nada","Esperar"],0],["Esperança ajuda?",["Sim","Não","Pouco"],0],["Promessas falham?",["Não","Sim","Às vezes"],0],["Devemos confiar?",["Sim","Não","Talvez"],0]]
    };

    window.entrar = async function() {
        jogadorNome = document.getElementById("nome").value.trim();
        if (!jogadorNome) return alert("Digite seu nome!");
        
        try {
            const authRes = await signInAnonymously(auth);
            uid = authRes.user.uid;

            let ref = doc(db, "progresso", jogadorNome);
            let snap = await getDoc(ref);

            dados = snap.exists() ? snap.data() : { nome: jogadorNome, xp: 0 };
            await setDoc(ref, dados);

            document.getElementById("loginSection").style.display = "none";
            menuDiv.style.display = "block";
            rankingDiv.style.display = "block";
            gerarMenu();
            carregarRanking();
        } catch (e) { alert("Erro de conexão. Ative o Login Anônimo no Firebase."); }
    }

    let atual = 0, acertos = 0, lista = [], temaAtual = "";

    window.start = (t) => {
        temaAtual = t; lista = temas[t]; atual = 0; acertos = 0;
        menuDiv.style.display = "none"; rankingDiv.style.display = "none";
        quizDiv.style.display = "block";
        renderQuestao();
    }

    function renderQuestao() {
        let q = lista[atual];
        let html = `<h2>${q[0]}</h2>`;
        q[1].forEach((op, i) => { html += `<button onclick="verificarResp(${i}, this)" class="quiz-btn">${op}</button>`; });
        quizDiv.innerHTML = html;
    }

    window.verificarResp = (i, btn) => {
        let certo = lista[atual][2];
        let som = document.getElementById(i === certo ? "somAcerto" : "somErro");
        som.currentTime = 0; som.play().catch(()=>{});

        if (i === certo) { acertos++; btn.classList.add("correct"); } else { btn.classList.add("wrong"); }

        setTimeout(() => {
            atual++;
            if (atual < lista.length) renderQuestao();
            else finalizar();
        }, 800);
    }

    async function finalizar() {
        let pct = Math.round((acertos / lista.length) * 100);
        let ganhoXP = pct >= 80 ? 50 : 10;

        dados[temaAtual] = Math.max(dados[temaAtual] || 0, pct);
        dados.xp = (dados.xp || 0) + ganhoXP;

        await setDoc(doc(db, "progresso", jogadorNome), dados);

        quizDiv.innerHTML = `<h2>Lição Finalizada!</h2><h1 style="font-size:60px">${pct}%</h1><p>Ganhou +${ganhoXP} XP</p><button onclick="location.reload()" style="background:#4CAF50;color:white">Voltar ao Menu</button>`;
    }

    function gerarMenu() {
        let html = `<h2>Olá, ${jogadorNome}</h2><p>✨ ${dados.xp || 0} XP</p><hr>`;
        for (let i = 1; i <= 12; i++) {
            let t = "t" + i;
            let block = i > 1 && (dados["t" + (i - 1)] || 0) < 80;
            let status = dados[t] ? `(${dados[t]}%)` : "";
            html += `<button onclick="start('${t}')" class="${block ? 'locked' : 'quiz-btn'}" ${block ? 'disabled' : ''}>Lição ${i} ${status}</button>`;
        }
        menuDiv.innerHTML = html;
    }

    async function carregarRanking() {
        let snap = await getDocs(collection(db, "progresso"));
        let l = []; snap.forEach(d => l.push(d.data()));
        l.sort((a, b) => (b.xp || 0) - (a.xp || 0));
        let h = "<h3>🏆 TOP 5 JOGADORES</h3>";
        l.slice(0, 5).forEach((u, i) => { h += `<div class="rank-item">${i + 1}º ${u.nome} - <b>${u.xp || 0} XP</b></div>`; });
        rankingDiv.innerHTML = h;
    }
</script>
</body>
</html>
