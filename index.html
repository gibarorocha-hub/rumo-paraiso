<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumo ao Paraíso em Família</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background:#111;
  color:#fff;
  margin:0;
  padding:20px;
}
button {
  width:90%;
  max-width:400px;
  margin:10px;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:18px;
}
.correct { background: green; }
.wrong { background: red; }
</style>
</head>

<body>

<h1>📖 Rumo ao Paraíso em Família (ONLINE)</h1>

<input id="nome" placeholder="Seu nome">

<button onclick="start()">▶️ Começar</button>
<button onclick="ranking()">🏆 Ranking Global</button>

<div id="quiz" style="display:none;">
<h2 id="q"></h2>
<div id="opts"></div>
<p id="f"></p>
</div>

<script type="module">

// 🔥 FIREBASE IMPORT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 CONFIG (SEU)
const firebaseConfig = {
  apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
  authDomain: "quiz-biblico-e1362.firebaseapp.com",
  projectId: "quiz-biblico-e1362",
  storageBucket: "quiz-biblico-e1362.firebasestorage.app",
  messagingSenderId: "381326315263",
  appId: "1:381326315263:web:9cf2558c764ded18f086ca"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PERGUNTAS
let perguntas = [
["Segundo João 17:3, o que leva à vida eterna?",["Conhecer a Deus","Dinheiro","Fama"],0],
["O que diz Salmos 83:18?",["Jeová é o nome de Deus","Deus não tem nome","Vários deuses"],0],
["Quem é o Deus verdadeiro?",["Jeová","Qualquer um","Ninguém"],0]
];

let atual=0, pontos=0, jogador="";

// START
window.start = function(){
  jogador = document.getElementById("nome").value || "Anônimo";
  document.getElementById("quiz").style.display="block";
  load();
}

// LOAD
function load(){
  let q=perguntas[atual];
  document.getElementById("q").innerText=q[0];

  let html="";
  q[1].forEach((op,i)=>{
    html+=`<button onclick="resp(${i})">${op}</button>`;
  });
  document.getElementById("opts").innerHTML=html;
}

// RESP
window.resp = function(i){
  if(i===perguntas[atual][2]) pontos++;
  atual++;

  if(atual<perguntas.length){
    load();
  }else{
    fim();
  }
}

// FIM
async function fim(){

  let pct = Math.round((pontos/perguntas.length)*100);

  // 🔥 SALVA ONLINE
  await addDoc(collection(db, "ranking"), {
    nome: jogador,
    pontos: pct,
    data: new Date().toLocaleString()
  });

  document.body.innerHTML = `
    <h2>${pct}%</h2>
    <button onclick="location.reload()">Voltar</button>
  `;
}

// RANKING
window.ranking = async function(){

  let snap = await getDocs(collection(db, "ranking"));

  let dados=[];
  snap.forEach(doc=>{
    dados.push(doc.data());
  });

  dados.sort((a,b)=>b.pontos-a.pontos);

  let html="<h2>🏆 Ranking Global</h2>";

  dados.slice(0,5).forEach(d=>{
    html+=`<p>${d.nome} - ${d.pontos}%</p>`;
  });

  html+=`<button onclick="location.reload()">Voltar</button>`;

  document.body.innerHTML=html;
}

</script>

</body>
</html>
