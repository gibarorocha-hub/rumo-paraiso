<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico MASTER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { width:90%; max-width:400px; margin:10px; padding:15px; border:none; border-radius:10px; }
.correct { background:green; }
.wrong { background:red; }
.locked { background:#444; color:#888; }
.progress { width:90%; max-width:400px; height:10px; background:#333; margin:auto; }
.progress-bar { height:10px; background:lime; width:0%; }
input { padding:10px; border-radius:8px; border:none; width:80%; margin:5px; }
canvas { max-width:90%; margin:auto; }
</style>
</head>

<body>

<h1 onclick="adminClick()">📖 Quiz Bíblico MASTER</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar conta</button>
<button onclick="recuperarSenha()">🔑 Esqueci a senha</button>
</div>

<div id="menu" style="display:none;">
<p id="userText"></p>
<button onclick="sair()">Sair</button>
<div id="botoes"></div>
<button onclick="ranking()">🏆 Ranking Geral</button>
</div>

<div id="quiz" style="display:none;">
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<h2 id="q"></h2>
<div id="opts"></div>
<p id="f"></p>
</div>

<div id="adminPanel" style="display:none;">
<h2>📊 ADMIN MASTER</h2>
<div id="dados"></div>
<canvas id="grafico"></canvas>
<button onclick="location.reload()">Voltar</button>
</div>

<audio id="somAcerto" src="Aplauso.mp3"></audio>
<audio id="somErro" src="Vaia.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
authDomain: "quiz-biblico-e1362.firebaseapp.com",
projectId: "quiz-biblico-e1362"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// DOM
const qEl = document.getElementById("q");
const opts = document.getElementById("opts");
const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");
const botoes = document.getElementById("botoes");
const dados = document.getElementById("dados");
const adminPanel = document.getElementById("adminPanel");
const loginBox = document.getElementById("loginBox");
const emailInput = document.getElementById("email");
const senhaInput = document.getElementById("senha");
const userText = document.getElementById("userText");

// SOM
function tocar(t){let a=document.getElementById(t==="acerto"?"somAcerto":"somErro");a.currentTime=0;a.play().catch(()=>{})}

// PERGUNTAS EXEMPLO
let temas = {
  t1:[
    ["Quem criou tudo?", ["Deus","Homem","Natureza"],0],
    ["Qual é o nome de Deus?", ["Jeová","Alá","Buda"],0],
    ["O que leva à vida eterna?", ["Conhecer a Deus","Ter dinheiro","Fama"],0]
  ],
  t2:[
    ["A Bíblia é o quê?", ["Palavra de Deus","Livro comum","História antiga"],0],
    ["Devemos confiar em quem?", ["Jeová","Nós mesmos","Qualquer pessoa"],0]
  ]
};

// LOGIN / CADASTRO
window.cadastrar = async () => {
  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  if(!email || !senha){alert("Preencha email e senha"); return;}
  try { await createUserWithEmailAndPassword(auth,email,senha); alert("Conta criada!"); }
  catch(e){alert(e.message);}
}
window.login = async () => {
  const email = emailInput.value.trim();
  const senha = senhaInput.value.trim();
  if(!email || !senha){alert("Preencha email e senha"); return;}
  try { await signInWithEmailAndPassword(auth,email,senha); }
  catch(e){alert(e.message);}
}
window.sair = ()=> signOut(auth);
window.recuperarSenha = async ()=>{ await sendPasswordResetEmail(auth,emailInput.value.trim()); alert("Email enviado!"); }

// USUÁRIO LOGADO
let jogador="";
onAuthStateChanged(auth,user=>{
  if(user){
    jogador=user.email;
    loginBox.style.display="none";
    menu.style.display="block";
    userText.innerText=jogador;
    gerarBotoes();
  } else {
    loginBox.style.display="block";
    menu.style.display="none";
  }
});

// PROGRESSO
async function getProgresso(){
  let ref = doc(db,"progresso",jogador);
  let snap = await getDoc(ref);
  return snap.exists()?snap.data():{};
}
async function salvarProgresso(tema,pct){
  let ref = doc(db,"progresso",jogador);
  let dados = await getProgresso();
  dados[tema] = pct;
  await setDoc(ref,dados);
}

// BOTÕES DE LIÇÃO
async function gerarBotoes(){
  let prog = await getProgresso();
  let html = "";
  let total = Object.keys(temas).length;
  for(let i=1;i<=total;i++){
    let t="t"+i;
    let prev = prog["t"+(i-1)]||0;
    let atualScore = prog[t]||0;
    if(i>1 && prev<80){
      html+=`<button class="locked">🔒 Lição ${i}</button>`;
    } else {
      html+=`<button onclick="start('${t}')">📚 Lição ${i}</button>`;
    }
  }
  botoes.innerHTML=html;
}

// QUIZ
let atual=0,acertos=0,lista=[],temaAtual="";
window.start = t=>{
  temaAtual = t;
  lista = temas[t]||temas.t1;
  atual=0; acertos=0;
  menu.style.display="none";
  quiz.style.display="block";
  load();
}
function load(){
  let q=lista[atual];
  qEl.innerText=q[0];
  let html="";
  q[1].forEach((op,i)=>{ html+=`<button onclick="resp(${i},this)">${op}</button>`; });
  opts.innerHTML = html;
  document.getElementById("bar").style.width = ((atual/lista.length)*100) + "%";
}
window.resp = (i,btn)=>{
  let certo = lista[atual][2];
  if(i===certo){ acertos++; btn.classList.add("correct"); tocar("acerto"); }
  else { btn.classList.add("wrong"); tocar("erro"); }
  setTimeout(()=>{
    atual++;
    if(atual<lista.length) load();
    else fim();
  },800);
}
async function fim(){
  let pct = Math.round((acertos/lista.length)*100);
  await salvarProgresso(temaAtual,pct);
  await addDoc(collection(db,"ranking"),{nome:jogador,tema:temaAtual,pontos:pct,data:new Date().toLocaleString()});
  quiz.innerHTML = `<h2>${pct}%</h2><button onclick="location.reload()">Menu</button>`;
}

// RANKING
window.ranking = async ()=>{
  let snap = await getDocs(collection(db,"progresso"));
  let listaRanking = [];
  snap.forEach(doc=>{
    let d=doc.data();
    let soma=0, cont=0;
    for(let i=1;i<=12;i++){ if(d["t"+i]){ soma+=d["t"+i]; cont++; } }
    let media = cont?Math.round(soma/cont):0;
    listaRanking.push({nome:doc.id,media});
  });
  listaRanking.sort((a,b)=>b.media-a.media);
  let html="<h2>🏆 Ranking Geral</h2>";
  listaRanking.forEach(r=>{ html+=`<p>${r.nome} - ${r.media}%</p>`; });
  html+="<button onclick='location.reload()'>Voltar</button>";
  menu.innerHTML=html;
}

// ADMIN
let clicks=0;
window.adminClick=()=>{ clicks++; if(clicks>=5) abrirAdmin(); }
async function abrirAdmin(){
  menu.style.display="none";
  adminPanel.style.display="block";
  let snap = await getDocs(collection(db,"progresso"));
  let html="";
  snap.forEach(doc=>{ html+=`<button onclick="verUsuario('${doc.id}')">${doc.id}</button>`; });
  dados.innerHTML=html;
}
window.verUsuario = async(user)=>{
  let ref = doc(db,"progresso",user);
  let snap = await getDoc(ref);
  let d = snap.data();
  let labels=[], valores=[];
  for(let i=1;i<=12;i++){ labels.push("L"+i); valores.push(d["t"+i]||0); }
  if(window.graficoObj) window.graficoObj.destroy();
  window.graficoObj = new Chart(document.getElementById("grafico"),{
    type:'bar',
    data:{ labels, datasets:[{label:user,data:valores}] }
  });
  dados.innerHTML+=`<br><button onclick="liberar('${user}')">🔓 Liberar tudo</button>`;
}
window.liberar = async(user)=>{
  let ref = doc(db,"progresso",user);
  let dados={};
  for(let i=1;i<=12;i++){ dados["t"+i]=100; }
  await setDoc(ref,dados);
  alert("Liberado!");
}

</script>
</body>
</html>
