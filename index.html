window.cadastrar = async () => {
  try { await createUserWithEmailAndPassword(auth,email.value.trim(),senha.value.trim()); alert("Conta criada com sucesso!"); }

}
window.login = async () => {
  try { await signInWithEmailAndPassword(auth,email.value.trim(),senha.value.trim()); }

window.sair = () => signOut(auth);
window.recuperarSenha = async () => { await sendPasswordResetEmail(auth,email.value.trim()); alert("Email de recuperação enviado!"); }

// QUIZ
let atual=0,acertos=0,lista=[],temaAtual="";

async function getProgresso(){ let ref=doc(db,"progresso",jogador); let snap=await getDoc(ref); return snap.exists()?snap.data():{} }
async function salvarProgresso(tema,pct){ let ref=doc(db,"progresso",jogador); let dados=await getProgresso(); dados[tema]=pct; await setDoc(ref,dados); }

window.gerarBotoes = async () => {
  let prog = await getProgresso(); let html="";
  for(let i=1;i<=12;i++){
    let t="t"+i; let prev=prog["t"+(i-1)]||0;
    if(i>1 && prev<80){ html+=`<button class="locked">🔒 Lição ${i}</button>`; }
    else{ html+=`<button onclick="start('${t}')">📚 Lição ${i}</button>`; }
  }
  document.getElementById("botoes").innerHTML=html;
}

window.start = (t) => { temaAtual=t; lista=temas[t]; atual=0; acertos=0; menu.classList.add("hidden"); quiz.classList.remove("hidden"); load(); }

function load(){ document.getElementById("q").innerText=lista[atual][0]; let html=""; lista[atual][1].forEach((op,i)=>{ html+=`<button onclick="resp(${i},this)">${op}</button>`; }); document.getElementById("opts").innerHTML=html; document.getElementById("bar").style.width = ((atual/lista.length)*100)+"%"; }

window.resp = (i,btn) => { let certo=lista[atual][2]; if(i===certo){ acertos++; btn.classList.add("correct"); tocar("acerto"); } else{ btn.classList.add("wrong"); tocar("erro"); } setTimeout(()=>{ atual++; if(atual<lista.length) load(); else fim(); },800); }

async function fim(){ let pct=Math.round((acertos/lista.length)*100); await salvarProgresso(temaAtual,pct); await addDoc(collection(db,"ranking"),{nome:jogador,tema:temaAtual,pontos:pct,data:new Date().toLocaleString()}); quiz.innerHTML=`<h2>${pct}%</h2><button onclick="location.reload()">⬅ Voltar ao Menu</button>`; }

// RANKING
window.ranking = async () => {
  let snap=await getDocs(collection(db,"progresso")); let listaRank=[];
  snap.forEach(d=>{
    let dta=d.data(),soma=0,cont=0;
    for(let i=1;i<=12;i++){ if(dta["t"+i]){soma+=dta["t"+i]; cont++;} }
    let media=cont?Math.round(soma/cont):0;
    listaRank.push({nome:d.id,media});
  });
  listaRank.sort((a,b)=>b.media-a.media);
  let html="<h2>🏆 Ranking Geral</h2>";
  listaRank.forEach(r=>{ html+=`<p>${r.nome} - ${r.media}%</p>`; });
  html+=`<button onclick="location.reload()">⬅ Voltar</button>`;
  document.getElementById("menu").innerHTML=html;
}

window.adminClick=()=>{ clickCount++; if(clickCount>=5){ document.getElementById("adminPanel").classList.remove("hidden"); menu.classList.add("hidden"); mostrarAdmin(); } }
async function mostrarAdmin(){
  let snap=await getDocs(collection(db,"ranking")); let html="<h3>Ranking Detalhado</h3>",data=[],snap.forEach(d=>{
    let item=d.data();
    html+=`<p>${item.nome} - ${item.tema} - ${item.pontos}% (${item.data})</p>`;
    labels.push(item.nome);
    data.push(item.pontos);
});
document.getElementById("dados").innerHTML=html;

// Criar gráfico
let ctx=document.getElementById("grafico").getContext("2d");
new Chart(ctx,{
    type:'bar',
    data:{
        labels:labels,
        datasets:[{
            label:'Pontuação',
            data:data,
            backgroundColor:'lime'
        }]
    },
    options:{
        responsive:true,
        scales:{y:{beginAtZero:true,max:100}}
    }
});
}
