<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico ULTRA</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }

button {
 margin:5px;
 padding:10px;
 width:90%;
 max-width:400px;
 border-radius:8px;
 border:none;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.admin{background:orange;}

.top{margin:10px;padding:10px;border:1px solid #555;border-radius:10px;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>
<button onclick="loginAdmin()">Login Admin</button>
<button onclick="multi()">👥 Multiplayer</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<audio id="acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c3f.mp3"></audio>
<audio id="erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8a9d1b1f.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "Pmbm5BqKNRXu3gXI4EPj5LrddNC3";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid=null, dados={}, combo=0;
let vidas=3, tempo=30, intervalo;
let lista=[], atual=0, acertos=0, temaAtual="";

// LOGIN ADMIN
window.loginAdmin = async function(){
let email=prompt("Email:");
let senha=prompt("Senha:");
let cred=await signInWithEmailAndPassword(auth,email,senha);
uid=cred.user.uid;
alert("ADMIN ATIVO");
entrar();
}

// LOGIN
const user = await signInAnonymously(auth);
if(!uid) uid=user.user.uid;

async function salvar(){
await setDoc(doc(db,"usuarios",uid),dados);
}

// ENTRAR
window.entrar = async function(){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let ref=doc(db,"usuarios",uid);
let snap=await getDoc(ref);

dados = snap.exists()? snap.data() : {nome,xp:0,nivel:1,progresso:{}};
dados.nome=nome;

await salvar();

menu.innerHTML=`
<h3>${dados.nome}</h3>
⭐ Nv ${dados.nivel} | XP ${dados.xp}<br>
${[...Array(12)].map((_,i)=>`<button onclick="start('t${i+1}')">Lição ${i+1}</button>`).join("")}
${uid===ADMIN_UID ? `<button class="admin" onclick="painelAdmin()">ADMIN</button>`:""}
`;

carregarRanking();
}

// 🔥 (suas perguntas continuam aqui igual você mandou)
let temas = {/* COLE SEU BLOCO COMPLETO AQUI */};

// START
window.start=function(t){
temaAtual=t;
lista=[...temas[t]];
atual=0; acertos=0; combo=0; vidas=3;
proxima();
}

// TIMER
function iniciarTempo(){
clearInterval(intervalo);
tempo=30;

intervalo=setInterval(()=>{
tempo--;
document.getElementById("tempo").innerText=tempo;

if(tempo<=0){
clearInterval(intervalo);
perdeVida();
}
},1000);
}

// CARREGAR PERGUNTA
function proxima(){

if(vidas<=0){
quiz.innerHTML="<h2>💀 GAME OVER</h2><button onclick='entrar()'>Menu</button>";
return;
}

if(atual>=lista.length){
finalizar();
return;
}

let q=lista[atual];

quiz.innerHTML=`
<div class="top">
❤️ ${vidas} | 🔥 ${combo} | ⏱️ <span id="tempo">30</span>
</div>
<h3>${q[0]}</h3>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i},this)">${op}</button>`;
});

iniciarTempo();
}

// RESPONDER
window.resp=function(i,btn){
clearInterval(intervalo);

if(i===lista[atual][2]){
combo++;
acertos++;
dados.xp+=10+(combo*2);
btn.classList.add("correct");
acerto.play();
}else{
btn.classList.add("wrong");
erro.play();
perdeVida();
return;
}

atual++;
setTimeout(proxima,400);
}

// PERDER VIDA
function perdeVida(){
vidas--;
combo=0;

if(vidas<=0){
quiz.innerHTML="<h2>💀 GAME OVER</h2><button onclick='entrar()'>Menu</button>";
return;
}

atual++;
setTimeout(proxima,400);
}

// FINAL
async function finalizar(){
let pct=Math.round((acertos/lista.length)*100);
dados.progresso[temaAtual]=pct;

if(dados.xp>=dados.nivel*100){
dados.nivel++; dados.xp=0;
}

await salvar();

quiz.innerHTML=`<h2>${pct}%</h2><button onclick="entrar()">Menu</button>`;
}

// RANKING
async function carregarRanking(){
let snap=await getDocs(collection(db,"usuarios"));
let lista=[];

snap.forEach(d=>lista.push(d.data()));

lista.sort((a,b)=>b.nivel-a.nivel || b.xp-a.xp);

ranking.innerHTML="<h3>🏆 Ranking</h3>"+lista.slice(0,5).map(u=>`<p>${u.nome} - Nv ${u.nivel}</p>`).join("");
}

// ADMIN
window.painelAdmin = async function(){
let snap = await getDocs(collection(db,"usuarios"));
let html = "<h3>ADMIN</h3>";

snap.forEach(docSnap=>{
let u = docSnap.data();
let id = docSnap.id;

html += `<div>${u.nome} - Nv ${u.nivel} XP ${u.xp}
<button onclick="addXP('${id}',50)">+XP</button></div>`;
});

admin.innerHTML = html;
}

window.addXP = async function(id,valor){
let ref = doc(db,"usuarios",id);
let snap = await getDoc(ref);
let xp = snap.data().xp || 0;
await updateDoc(ref,{xp: xp + valor});
painelAdmin();
}

// MULTIPLAYER
window.multi=function(){
let p1=prompt("Jogador 1:");
let p2=prompt("Jogador 2:");

let turno=0, pontos=[0,0];
lista=[...temas.t1];

function rodada(){
let q=lista.pop();

quiz.innerHTML=`<h3>${[p1,p2][turno]}</h3><h4>${q[0]}</h4>`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="jogada(${i},${q[2]})">${op}</button>`;
});
}

window.jogada=function(i,c){
if(i===c) pontos[turno]++;

turno=1-turno;

if(lista.length) rodada();
else{
quiz.innerHTML=`<h2>${p1}: ${pontos[0]} | ${p2}: ${pontos[1]}</h2>`;
}
}

rodada();
}

</script>
</body>
</html>
