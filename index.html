<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico ULTRA PRO</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }

button {
 margin:5px;
 padding:10px;
 width:90%;
 max-width:400px;
 border-radius:8px;
 border:none;
 font-weight:bold;
}

.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.admin{background:orange;}

.top{margin:10px;padding:10px;border:1px solid #555;border-radius:10px;}
.barra{background:#333;height:10px;border-radius:10px;overflow:hidden;margin-top:5px;}
.barraTempo{height:10px;background:red;width:100%;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA PRO</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>
<button onclick="loginAdmin()">Admin</button>
<button onclick="multi()">👥 Multiplayer</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<audio id="acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c3f.mp3"></audio>
<audio id="erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8a9d1b1f.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "Pmbm5BqKNRXu3gXI4EPj5LrddNC3";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid=null, dados={}, combo=0;
let vidas=3, tempo=30, intervalo;
let lista=[], atual=0, acertos=0, temaAtual="";

// shuffle
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

// login
window.loginAdmin = async function(){
let email=prompt("Email:");
let senha=prompt("Senha:");
let cred=await signInWithEmailAndPassword(auth,email,senha);
uid=cred.user.uid;
alert("ADMIN");
entrar();
}

const user = await signInAnonymously(auth);
if(!uid) uid=user.user.uid;

async function salvar(){
await setDoc(doc(db,"usuarios",uid),dados);
}

// entrar
window.entrar = async function(){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let ref=doc(db,"usuarios",uid);
let snap=await getDoc(ref);

dados = snap.exists()? snap.data() : {nome,xp:0,nivel:1,progresso:{}};
dados.nome=nome;

await salvar();

menu.innerHTML=`
<h3>${dados.nome}</h3>
⭐ Nv ${dados.nivel} | XP ${dados.xp}<br>
${[...Array(12)].map((_,i)=>`<button onclick="start('t${i+1}')">Lição ${i+1}</button>`).join("")}
${uid===ADMIN_UID?`<button class="admin" onclick="painelAdmin()">ADMIN</button>`:""}
`;

carregarRanking();
}

// perguntas (SUAS)
let temas = {
// 👉 cola aqui o bloco completo que você mandou (t1 até t12)
// NÃO ALTERA NADA
};

// start
window.start=function(t){
temaAtual=t;
lista=shuffle([...temas[t]]);
atual=0; acertos=0; combo=0; vidas=3;
proxima();
}

// tempo
function iniciarTempo(){
clearInterval(intervalo);
tempo=30;

intervalo=setInterval(()=>{
tempo--;
document.getElementById("tempo").innerText=tempo;
document.getElementById("barraTempo").style.width=(tempo/30*100)+"%";

if(tempo<=0){
clearInterval(intervalo);
perdeVida();
}
},1000);
}

// pergunta
function proxima(){

if(vidas<=0){
quiz.innerHTML="<h2>💀 GAME OVER</h2><button onclick='entrar()'>Menu</button>";
return;
}

if(atual>=lista.length){
finalizar();
return;
}

let q=lista[atual];

quiz.innerHTML=`
<div class="top">
❤️ ${vidas} | 🔥 ${combo} | ⏱️ <span id="tempo">30</span>
<div class="barra"><div id="barraTempo" class="barraTempo"></div></div>
</div>
<h3>${q[0]}</h3>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i},this)">${op}</button>`;
});

iniciarTempo();
}

// resposta
window.resp=function(i,btn){

clearInterval(intervalo);
document.querySelectorAll("button").forEach(b=>b.disabled=true);

if(i===lista[atual][2]){
combo++;
acertos++;
dados.xp+=5+(combo*3);
btn.classList.add("correct");
acerto.play();
navigator.vibrate(100);
quiz.innerHTML+=`<p style="color:lime">🔥 PERFEITO</p>`;
}else{
btn.classList.add("wrong");
erro.play();
navigator.vibrate(300);
quiz.innerHTML+=`<p style="color:red">💀 ERROU FEIO</p>`;
perdeVida();
return;
}

atual++;
setTimeout(proxima,600);
}

// perder vida
function perdeVida(){
vidas--;
combo=0;

if(vidas<=0){
quiz.innerHTML="<h2>💀 GAME OVER</h2><button onclick='entrar()'>Menu</button>";
return;
}

atual++;
setTimeout(proxima,600);
}

// finalizar
async function finalizar(){
let pct=Math.round((acertos/lista.length)*100);
dados.progresso[temaAtual]=pct;

if(dados.xp>=dados.nivel*100){
dados.nivel++; dados.xp=0;
}

await salvar();

quiz.innerHTML=`<h2>${pct}%</h2><button onclick="entrar()">Menu</button>`;
}

// ranking sem duplicar
async function carregarRanking(){
let snap=await getDocs(collection(db,"usuarios"));
let nomes={};

snap.forEach(d=>{
let u=d.data();
nomes[u.nome]=u;
});

let lista=Object.values(nomes);
lista.sort((a,b)=>b.nivel-a.nivel || b.xp-a.xp);

ranking.innerHTML="<h3>🏆 Ranking</h3>"+lista.slice(0,5).map(u=>`<p>${u.nome} - Nv ${u.nivel}</p>`).join("");
}

// admin
window.painelAdmin = async function(){
let snap = await getDocs(collection(db,"usuarios"));
let html="<h3>ADMIN</h3>";

snap.forEach(docSnap=>{
let u=docSnap.data();
let id=docSnap.id;

html+=`
<div>
${u.nome} | Nv ${u.nivel} | XP ${u.xp}
<button onclick="addXP('${id}',50)">+XP</button>
<button onclick="reset('${id}')">Reset</button>
</div>
`;
});

admin.innerHTML=html;
}

window.addXP = async function(id,v){
let ref=doc(db,"usuarios",id);
let snap=await getDoc(ref);
await updateDoc(ref,{xp:(snap.data().xp||0)+v});
painelAdmin();
}

window.reset = async function(id){
await updateDoc(doc(db,"usuarios",id),{xp:0,nivel:1});
painelAdmin();
}

// multiplayer
window.multi=function(){

let p1=prompt("Jogador 1:");
let p2=prompt("Jogador 2:");

let turno=0, pontos=[0,0];
let perguntas=shuffle([...temas.t1]);

function rodada(){

if(!perguntas.length){
let vencedor = pontos[0]>pontos[1]?p1:p2;

quiz.innerHTML=`
<h2>🏆 ${vencedor} venceu!</h2>
<p>${p1}: ${pontos[0]} | ${p2}: ${pontos[1]}</p>
<button onclick="entrar()">Menu</button>
`;
return;
}

let q=perguntas.pop();

quiz.innerHTML=`
<h3>🎮 Turno: ${[p1,p2][turno]}</h3>
<h4>${q[0]}</h4>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="jogada(${i},${q[2]})">${op}</button>`;
});
}

window.jogada=function(i,c){
document.querySelectorAll("button").forEach(b=>b.disabled=true);

if(i===c){
pontos[turno]++;
acerto.play();
}else{
erro.play();
}

turno=1-turno;
setTimeout(rodada,600);
}

rodada();
}

</script>
</body>
</html>
