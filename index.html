<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico ABSURDO</title>

<style>
body { font-family: Arial; text-align:center; background:#0b0b0b; color:#fff; }

button {
 margin:5px;
 padding:12px;
 width:90%;
 max-width:400px;
 border-radius:10px;
 border:none;
 font-size:16px;
}

.correct{background:#00c853;}
.wrong{background:#d50000;}
.locked{background:#333;color:#777;}
.admin{background:orange;}

.top{
margin:10px;
padding:10px;
border:1px solid #444;
border-radius:10px;
}

</style>
</head>

<body>

<h2>📖 Quiz Bíblico ABSURDO</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>

<audio id="acerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c3f.mp3"></audio>
<audio id="erro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8a9d1b1f.mp3"></audio>

<script>

let dados={nome:"",xp:0,nivel:1,liga:"Bronze",streak:0};
let vidas=3,combo=0,tempo=30,intervalo;

let perguntas = [
["Qual NÃO é objetivo da Bíblia?",["Ensinar","Guiar","Confundir"],2],
["Mateus 7:7 ensina:",["Buscar","Esperar","Ignorar"],0],
["Romanos 15:4 fala de:",["Esperança","Medo","Confusão"],0],
["Ignorar perguntas causa:",["Estagnação","Fé","Alegria"],0],
["Entender exige:",["Esforço","Sorte","Nada"],0],
["A Bíblia ajuda:",["Vida prática","Nada","Só teoria"],0],
["Perguntar mostra:",["Interesse","Erro","Fraqueza"],0],
["Estudo gera:",["Mudança","Nada","Orgulho"],0],
["A Bíblia é:",["Proveitosa","Confusa","Limitada"],0],
["Dúvida sincera leva a:",["Aprender","Desviar","Parar"],0]
];

// DUPLICA PARA FICAR LONGO (SIMULA 120)
perguntas = Array(12).fill(perguntas).flat();

let lista=[], atual=0, acertos=0;

// ENTRAR
function entrar(){
dados.nome=document.getElementById("nome").value;
if(!dados.nome) return alert("Digite nome");

menu.innerHTML=`
<h3>${dados.nome}</h3>
⭐ Nv ${dados.nivel} | XP ${dados.xp}<br>
🏆 Liga: ${dados.liga}<br>
<button onclick="start()">Jogar</button>
`;
}

// INICIAR
function start(){
lista = perguntas.sort(()=>Math.random()-0.5);
atual=0;
acertos=0;
vidas=3;
combo=0;
dados.streak=0;
load();
}

function load(){
let q=lista[atual];
tempo=30;

quiz.innerHTML=`
<div class="top">
❤️ ${vidas} | 🔥 ${combo} | ⚡ Streak ${dados.streak}<br>
⏱️ <span id="tempo">${tempo}</span>
</div>

<h3>${q[0]}</h3>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i},this)">${op}</button>`;
});

timer();
}

function timer(){
clearInterval(intervalo);
intervalo=setInterval(()=>{
tempo--;
tempo<=0 && erro();
document.getElementById("tempo").innerText=tempo;
},1000);
}

function resp(i,btn){
clearInterval(intervalo);

if(i===lista[atual][2]){
acerto(btn);
}else{
erro(btn);
}
}

function acerto(btn){
btn.classList.add("correct");
document.getElementById("acerto").play();

combo++;
dados.streak++;
dados.xp+=10+(combo*3);

acertos++;
proxima();
}

function erro(btn){
if(btn) btn.classList.add("wrong");
document.getElementById("erro").play();

vidas--;
combo=0;
dados.streak=0;

if(vidas<=0){
gameOver();
return;
}

proxima();
}

function proxima(){
atual++;
setTimeout(()=>{
if(atual<lista.length){
load();
}else{
final();
}
},400);
}

function final(){
let pct=Math.round((acertos/lista.length)*100);

if(dados.xp>=dados.nivel*100){
dados.nivel++;
dados.xp=0;
}

atualizarLiga();

quiz.innerHTML=`
<h2>${pct}%</h2>
<p>Liga: ${dados.liga}</p>
<button onclick="entrar()">Menu</button>
`;
}

function atualizarLiga(){
if(dados.nivel>=10) dados.liga="Lendário 🔥";
else if(dados.nivel>=7) dados.liga="Ouro 🥇";
else if(dados.nivel>=4) dados.liga="Prata 🥈";
else dados.liga="Bronze 🥉";
}

function gameOver(){
quiz.innerHTML=`<h2>💀 GAME OVER</h2><button onclick="entrar()">Menu</button>`;
}

</script>
</body>
</html>
