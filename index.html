<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico PRO</title>
    <style>
        body { font-family: sans-serif; text-align:center; background:#111; color:#fff; margin:0; padding:20px; }
        input { padding:15px; border-radius:8px; border:none; width:85%; margin-bottom:10px; font-size:16px; background: #222; color: #fff; border: 1px solid #444; }
        button { width:90%; max-width:400px; margin:8px; padding:15px; border:none; border-radius:10px; cursor:pointer; font-size:16px; font-weight:bold; }
        .tema-btn { background: #007bff; color: white; }
        .opt-btn { background: #333; color: white; border: 1px solid #555; }
        .correct { background: green ! immortality !important; }
        .wrong { background: red !important; }
        #f { font-size: 1.2em; margin: 15px; color: yellow; min-height: 1.2em; }
        .progress { width:90%; height:10px; background:#333; margin:10px auto; border-radius:5px; overflow:hidden; }
        #bar { height:100%; background:lime; width:0%; transition: 0.3s; }
    </style>
</head>
<body>

<h1 id="titulo">📖 Quiz Bíblico PRO</h1>

<!-- TELA DE LOGIN -->
<div id="loginBox">
    <p>Digite seu nome para jogar:</p>
    <input id="nomeInput" placeholder="Seu nome..."><br>
    <button onclick="login()" style="background: lime; color: #000;">INICIAR JOGO</button>
</div>

<!-- MENU PRINCIPAL -->
<div id="menu" style="display:none;">
    <p>Bem-vindo, <span id="userText" style="color:lime"></span>!</p>
    <div id="botoesTemas"></div>
    <button onclick="location.reload()" style="background: #555; color: white;">Sair</button>
</div>

<!-- TELA DO QUIZ -->
<div id="quiz" style="display:none;">
    <div class="progress"><div id="bar"></div></div>
    <h2 id="perguntaTexto"></h2>
    <div id="opcoesDiv"></div>
    <p id="f"></p>
    <button onclick="voltarMenu()" id="btnVoltar" style="display:none; background:#444; color: white;">Voltar ao Menu</button>
</div>

<script>
// Dados do Jogo (Local)
let jogador = "";
let perguntasAtuais = [];
let indice = 0;
let pontos = 0;

const temas = {
    t1: { nome: "Conhecer a Deus", p: [["Qual o nome de Deus?", ["Jeová", "Jesus", "Maria"], 0], ["Quem criou tudo?", ["Deus", "Homem", "Natureza"], 0]] },
    t2: { nome: "A Bíblia", p: [["A Bíblia é?", ["Palavra de Deus", "Livro comum", "História"], 0], ["Devemos ler a Bíblia?", ["Sim", "Não", "Às vezes"], 0]] },
    t3: { nome: "Oração", p: [["Orar é?", ["Falar com Deus", "Pensar", "Nada"], 0], ["Deus ouve?", ["Sim", "Não", "Talvez"], 0]] }
};

// Funções de Navegação
function login() {
    const input = document.getElementById("nomeInput");
    jogador = input.value.trim();
    
    if(jogador === "") {
        alert("Por favor, digite seu nome!");
        return;
    }
    
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("userText").innerText = jogador;
    
    const container = document.getElementById("botoesTemas");
    container.innerHTML = "";
    for(let id in temas){
        let b = document.createElement("button");
        b.innerText = temas[id].nome;
        b.className = "tema-btn";
        b.onclick = function() { iniciarQuiz(id); };
        container.appendChild(b);
    }
}

function iniciarQuiz(id) {
    perguntasAtuais = temas[id].p;
    indice = 0; 
    pontos = 0;
    document.getElementById("menu").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    document.getElementById("btnVoltar").style.display = "none";
    mostrarPergunta();
}

function mostrarPergunta() {
    document.getElementById("f").innerText = "";
    if(indice >= perguntasAtuais.length) {
        finalizar();
        return;
    }
    
    let dados = perguntasAtuais[indice]; // [pergunta, [opções], indexCerto]
    document.getElementById("perguntaTexto").innerText = dados[0];
    document.getElementById("bar").style.width = (indice / perguntasAtuais.length * 100) + "%";
    
    const div = document.getElementById("opcoesDiv");
    div.innerHTML = "";
    
    dados[1].forEach((txt, i) => {
        let b = document.createElement("button");
        b.innerText = txt;
        b.className = "opt-btn";
        b.onclick = function() { checar(i, dados[2]); };
        div.appendChild(b);
    });
}

function checar(escolha, certa) {
    const btns = document.querySelectorAll(".opt-btn");
    btns.forEach(b => b.disabled = true);
    
    if(escolha === certa) {
        pontos++;
        btns[escolha].style.background = "green";
        document.getElementById("f").innerText = "🔥 Resposta Correta!";
    } else {
        btns[escolha].style.background = "red";
        btns[certa].style.background = "green";
        document.getElementById("f").innerText = "❌ Você errou!";
    }
    
    setTimeout(() => { 
        indice++; 
        mostrarPergunta(); 
    }, 1500);
}

function finalizar() {
    document.getElementById("perguntaTexto").innerText = "Fim do Jogo!";
    document.getElementById("opcoesDiv").innerHTML = "<h3>Você acertou " + pontos + " de " + perguntasAtuais.length + "</h3>";
    document.getElementById("bar").style.width = "100%";
    document.getElementById("btnVoltar").style.display = "block";
    document.getElementById("f").innerText = "Parabéns, " + jogador + "!";
}

function voltarMenu() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("menu").style.display = "block";
}
</script>
</body>
</html>
