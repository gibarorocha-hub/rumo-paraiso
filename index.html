<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumo ao Paraíso</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { margin:5px; padding:12px; border:none; border-radius:8px; width:90%; max-width:400px;}
.correct{background:green;}
.wrong{background:red;}
</style>
</head>

<body>

<h1>📖 Rumo ao Paraíso</h1>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 COLOCA SEUS DADOS AQUI
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// login anônimo
const user = await signInAnonymously(auth);
const uid = user.user.uid;

let dados = {};

// LOGIN
window.entrar = async function(){

let nome = document.getElementById("nome").value;
if(!nome) return alert("Digite seu nome");

let ref = doc(db,"usuarios",uid);
let snap = await getDoc(ref);

if(snap.exists()){
dados = snap.data();
}else{
dados = {
nome,
xp:0,
nivel:1
};
await setDoc(ref,dados);
}

// mostrar menu
document.getElementById("menu").innerHTML = `
<h3>👤 ${dados.nome}</h3>
<p>Nível ${dados.nivel} | XP ${dados.xp}</p>
<button onclick="start()">Começar Quiz</button>
`;

}

// QUIZ
let perguntas = [
["Deus quer que sejamos felizes?",["Sim","Não","Talvez"],0],
["A Bíblia é inspirada por Deus?",["Sim","Não","Talvez"],0],
["Precisamos aplicar o que aprendemos?",["Sim","Não","Depende"],0],
["Conhecer Deus exige esforço?",["Sim","Não","Depende"],0],
["Só acreditar basta?",["Sim","Não","Talvez"],1]
];

let atual = 0;
let acertos = 0;

window.start = function(){
atual = 0;
acertos = 0;
load();
}

function load(){

let q = perguntas[atual];

let html = `<h2>${q[0]}</h2>`;

q[1].forEach((op,i)=>{
html += `<button onclick="responder(${i},this)">${op}</button>`;
});

document.getElementById("quiz").innerHTML = html;
}

// RESPONDER
window.responder = async function(i,btn){

if(i === perguntas[atual][2]){
acertos++;
dados.xp += 10;
btn.classList.add("correct");
}else{
btn.classList.add("wrong");
}

// subir nível
if(dados.xp >= dados.nivel * 100){
dados.xp = 0;
dados.nivel++;
}

// salvar
await setDoc(doc(db,"usuarios",uid),dados);

atual++;

setTimeout(()=>{
if(atual < perguntas.length){
load();
}else{
document.getElementById("quiz").innerHTML = `
<h2>Resultado: ${acertos}/${perguntas.length}</h2>
<button onclick="voltar()">Voltar</button>
`;
}
},500);

}

// VOLTAR
window.voltar = function(){
document.getElementById("quiz").innerHTML = "";
}

</script>

</body>
</html>
