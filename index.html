<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico PRO</title>
    <style>
        body { font-family: sans-serif; text-align:center; background:#111; color:#fff; margin:0; padding:20px; }
        input { padding:15px; border-radius:8px; border:none; width:85%; margin-bottom:10px; font-size:16px; }
        button { width:90%; max-width:400px; margin:8px; padding:15px; border:none; border-radius:10px; cursor:pointer; font-size:16px; font-weight:bold; }
        .tema-btn { background: #007bff; color: white; }
        .opt-btn { background: #333; color: white; border: 1px solid #555; }
        .correct { background: green !important; }
        .wrong { background: red !important; }
        #f { font-size: 1.2em; margin: 15px; color: yellow; }
        .progress { width:90%; height:10px; background:#333; margin:10px auto; border-radius:5px; overflow:hidden; }
        #bar { height:100%; background:lime; width:0%; transition: 0.3s; }
    </style>
</head>
<body>

<h1 onclick="adminClick()">📖 Quiz Bíblico PRO</h1>

<!-- TELA DE LOGIN -->
<div id="loginBox">
    <input id="nomeInput" placeholder="Digite seu nome">
    <button onclick="login()" style="background: lime; color: #000;">INICIAR</button>
</div>

<!-- MENU PRINCIPAL -->
<div id="menu" style="display:none;">
    <p>Bem-vindo, <span id="userText" style="color:lime"></span>!</p>
    <div id="botoesTemas"></div>
    <button onclick="verRanking()" style="background: orange;">🏆 Ranking</button>
    <button onclick="location.reload()">Sair</button>
</div>

<!-- TELA DO QUIZ -->
<div id="quiz" style="display:none;">
    <div class="progress"><div id="bar"></div></div>
    <h2 id="perguntaTexto"></h2>
    <div id="opcoesDiv"></div>
    <p id="f"></p>
    <button onclick="voltarMenu()" id="btnVoltar" style="display:none; background:#444;">Voltar ao Menu</button>
</div>

<!-- PAINEL ADMIN -->
<div id="adminPanel" style="display:none;">
    <h2>ADMIN</h2>
    <div id="dadosAdmin"></div>
    <button onclick="location.reload()">Fechar</button>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, deleteDoc } from "https://gstatic.com";

const firebaseConfig = {
    apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
    authDomain: "://firebaseapp.com",
    projectId: "quiz-biblico-e1362"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Dados do Jogo
let jogador = "";
let perguntasAtuais = [];
let indice = 0;
let pontos = 0;

const temas = {
    t1: { nome: "Conhecer a Deus", p: [["Qual o nome de Deus?", ["Jeová", "Jesus", "Maria"], 0], ["Quem criou tudo?", ["Deus", "Homem", "Natureza"], 0]] },
    t2: { nome: "A Bíblia", p: [["A Bíblia é?", ["Palavra de Deus", "Livro comum", "História"], 0], ["Devemos ler a Bíblia?", ["Sim", "Não", "Às vezes"], 0]] }
};

// Funções Globais (necessário window para o GitHub)
window.login = () => {
    jogador = document.getElementById("nomeInput").value.trim();
    if(!jogador) return alert("Digite seu nome!");
    
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("userText").innerText = jogador;
    
    const container = document.getElementById("botoesTemas");
    container.innerHTML = "";
    for(let id in temas){
        let b = document.createElement("button");
        b.innerText = temas[id].nome;
        b.className = "tema-btn";
        b.onclick = () => iniciarQuiz(id);
        container.appendChild(b);
    }
};

function iniciarQuiz(id) {
    perguntasAtuais = temas[id].p;
    indice = 0; pontos = 0;
    document.getElementById("menu").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    document.getElementById("btnVoltar").style.display = "none";
    mostrarPergunta();
}

function mostrarPergunta() {
    document.getElementById("f").innerText = "";
    if(indice >= perguntasAtuais.length) return finalizar();
    
    let dados = perguntasAtuais[indice];
    document.getElementById("perguntaTexto").innerText = dados[0];
    document.getElementById("bar").style.width = (indice / perguntasAtuais.length * 100) + "%";
    
    const div = document.getElementById("opcoesDiv");
    div.innerHTML = "";
    dados[1].forEach((txt, i) => {
        let b = document.createElement("button");
        b.innerText = txt;
        b.className = "opt-btn";
        b.onclick = () => checar(i, dados[2]);
        div.appendChild(b);
    });
}

function checar(escolha, certa) {
    const btns = document.querySelectorAll(".opt-btn");
    btns.forEach(b => b.disabled = true);
    
    if(escolha === certa) {
        pontos++;
        btns[escolha].classList.add("correct");
        document.getElementById("f").innerText = "🔥 Acertou!";
    } else {
        btns[escolha].classList.add("wrong");
        btns[certa].classList.add("correct");
        document.getElementById("f").innerText = "❌ Errou!";
    }
    
    setTimeout(() => { indice++; mostrarPergunta(); }, 1500);
}

async function finalizar() {
    document.getElementById("perguntaTexto").innerText = `Fim! Pontos: ${pontos}`;
    document.getElementById("opcoesDiv").innerHTML = "";
    document.getElementById("btnVoltar").style.display = "block";
    
    try {
        await addDoc(collection(db, "ranking"), { nome: jogador, pontos: pontos, data: new Date() });
    } catch(e) { console.log(e); }
}

window.verRanking = async () => {
    const q = query(collection(db, "ranking"), orderBy("pontos", "desc"), limit(5));
    const snap = await getDocs(q);
    let txt = "🏆 TOP 5:\n";
    snap.forEach(d => txt += `${d.data().nome}: ${d.data().pontos} pts\n`);
    alert(txt);
};

window.voltarMenu = () => {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("menu").style.display = "block";
};

// Admin oculto (5 cliques no título)
let cliques = 0;
window.adminClick = () => {
    cliques++;
    if(cliques >= 5) {
        document.getElementById("menu").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        abrirAdmin();
    }
};

async function abrirAdmin() {
    const box = document.getElementById("dadosAdmin");
    box.innerText = "Carregando...";
    const snap = await getDocs(collection(db, "ranking"));
    box.innerHTML = "";
    snap.forEach(d => {
        box.innerHTML += `<p>${d.data().nome} - ${d.data().pontos} <button onclick="apagar('${d.id}')">X</button></p>`;
    });
}

window.apagar = async (id) => {
    if(confirm("Apagar?")) {
        await deleteDoc(doc(db, "ranking", id));
        abrirAdmin();
    }
};
</script>
</body>
</html>
