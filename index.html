<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico ULTRA</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { margin:5px; padding:10px; width:90%; max-width:400px; border-radius:8px; border:none; }
.locked{background:#444;color:#888;}
.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.admin{background:orange;}
.timer{color:orange;}
.life{color:red;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>
<button onclick="loginAdmin()">Login Admin</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "Pmbm5BqKNRXu3gXI4EPj5LrddNC3";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid=null, dados={}, vidas=3, tempo=30, timer;

// LOGIN
const user = await signInAnonymously(auth);
uid=user.user.uid;

// ADMIN
window.loginAdmin = async function(){
let email=prompt("Email:");
let senha=prompt("Senha:");
let cred=await signInWithEmailAndPassword(auth,email,senha);
uid=cred.user.uid;
alert("ADMIN ATIVO");
}

// SALVAR
async function salvar(){ await setDoc(doc(db,"usuarios",uid),dados); }

// ENTRAR
window.entrar = async function(){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let snap=await getDoc(doc(db,"usuarios",uid));
dados = snap.exists()?snap.data():{nome,xp:0,nivel:1,progresso:{}};

dados.nome=nome;
await salvar();

menu.innerHTML=`
<h3>${nome}</h3>
<button onclick="modoSolo()">🎯 Solo</button>
<button onclick="criarSala()">🌍 Criar Sala</button>
<button onclick="entrarSala()">🔑 Entrar Sala</button>
${uid===ADMIN_UID?`<button class="admin" onclick="painelAdmin()">ADMIN</button>`:""}
`;

carregarRanking();
}

// 📚 PERGUNTAS (AS SUAS 12 LIÇÕES COMPLETAS)
let temas = {
// 👉 COLE AQUI EXATAMENTE O BLOCO QUE VOCÊ MANDOU (t1 até t12)
};

// 🎲 GERAR 10 ALEATÓRIAS
function perguntasAleatorias(){
let todas=[];
Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

// ================= SOLO =================
let lista=[], atual=0, pontos=0;

window.modoSolo=function(){
lista=perguntasAleatorias();
atual=0;
vidas=3;
pontos=0;
load();
}

function iniciarTimer(){
tempo=30;
clearInterval(timer);
timer=setInterval(()=>{
tempo--;
document.getElementById("timer").innerText="⏱ "+tempo;
if(tempo<=0){ perderVida(); }
},1000);
}

function perderVida(){
clearInterval(timer);
vidas--;
if(vidas<=0) fim();
else load();
}

function load(){
let q=lista[atual];
quiz.innerHTML=`
<h3>${q[0]}</h3>
<p class="timer" id="timer">⏱ 30</p>
<p class="life">❤️ ${vidas}</p>
`;
q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i})">${op}</button>`;
});
iniciarTimer();
}

window.resp=function(i){
clearInterval(timer);

if(i===lista[atual][2]) pontos+=10;
else perderVida();

atual++;

setTimeout(()=>{
if(atual<lista.length) load();
else fim();
},500);
}

function fim(){
quiz.innerHTML=`<h2>Pontos: ${pontos}</h2><button onclick="entrar()">Menu</button>`;
}

// ================= MULTIPLAYER =================

let salaCodigo="";

window.criarSala = async function(){
salaCodigo = Math.random().toString(36).substring(2,6).toUpperCase();

await setDoc(doc(db,"salas",salaCodigo),{
perguntas: perguntasAleatorias(),
jogadores:{},
estado:"esperando"
});

alert("Código da sala: "+salaCodigo);
escutarSala();
}

window.entrarSala = async function(){
salaCodigo = prompt("Código da sala:");
escutarSala();
}

function escutarSala(){
onSnapshot(doc(db,"salas",salaCodigo),snap=>{
let sala=snap.data();

if(!sala) return;

if(!sala.jogadores[uid]){
sala.jogadores[uid]={nome:dados.nome,pontos:0};
updateDoc(doc(db,"salas",salaCodigo),{jogadores:sala.jogadores});
}

if(Object.keys(sala.jogadores).length>=2 && sala.estado==="esperando"){
updateDoc(doc(db,"salas",salaCodigo),{estado:"jogando",atual:0});
}

if(sala.estado==="jogando"){
multiplayerLoad(sala);
}
});
}

function multiplayerLoad(sala){
let q=sala.perguntas[sala.atual];

quiz.innerHTML=`<h3>${q[0]}</h3>`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="respMulti(${i})">${op}</button>`;
});
}

window.respMulti = async function(i){
let ref=doc(db,"salas",salaCodigo);
let snap=await getDoc(ref);
let sala=snap.data();

if(i===sala.perguntas[sala.atual][2]){
sala.jogadores[uid].pontos+=10;
}

sala.atual++;

if(sala.atual>=10){
sala.estado="fim";
}

await updateDoc(ref,sala);

if(sala.estado==="fim"){
let ranking=Object.values(sala.jogadores).sort((a,b)=>b.pontos-a.pontos);
quiz.innerHTML=`🏆 Vencedor: ${ranking[0].nome}`;
}
}

// ================= RANKING =================
function carregarRanking(){
onSnapshot(collection(db,"usuarios"),snap=>{
let lista=[];
snap.forEach(d=>lista.push({...d.data(),id:d.id}));

let unicos = Object.values(lista.reduce((acc,u)=>{acc[u.id]=u;return acc;},{}));

unicos.sort((a,b)=>b.nivel-b.nivel || b.xp-a.xp);

ranking.innerHTML="<h3>🏆 Ranking</h3>"+
unicos.slice(0,5).map(u=>`<p>${u.nome} - ${u.xp}</p>`).join("");
});
}

// ================= ADMIN =================
window.painelAdmin = async function(){
let snap=await getDocs(collection(db,"usuarios"));
let html="<h3>ADMIN</h3>";

snap.forEach(d=>{
let u=d.data();
html+=`<div>${u.nome} XP:${u.xp}</div>`;
});

admin.innerHTML=html;
}

</script>
</body>
</html>
