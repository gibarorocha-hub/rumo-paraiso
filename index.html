<style>

button {
 margin:5px;

 width:90%;
 max-width:400px;
 border-radius:8px;

}

.locked{background:#444;color:#888;}
.correct{background:#2ecc71;}
.wrong{background:#e74c3c;}
.admin{background:orange;}

.progress-bar{
width:90%;max-width:400px;background:#333;border-radius:10px;margin:10px auto;
}
.progress{height:20px;background:limegreen;border-radius:10px;}

.card{
border:1px solid #555;
margin:10px;
padding:10px;
border-radius:10px;
}

</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>
<button onclick="loginAdmin()">Login Admin</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<audio id="somAcerto" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c3f.mp3"></audio>
<audio id="somErro" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8a9d1b1f.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "Pmbm5BqKNRXu3gXI4EPj5LrddNC3";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let uid=null, dados={}, combo=0;

// LOGIN ADMIN
window.loginAdmin = async function(){
let email=prompt("Email:");
let senha=prompt("Senha:");
try{
let cred=await signInWithEmailAndPassword(auth,email,senha);
uid=cred.user.uid;
alert("ADMIN ATIVO");
entrar();
}catch{alert("Erro login")}
}

// LOGIN ANÔNIMO
const user = await signInAnonymously(auth);
if(!uid) uid=user.user.uid;

// SALVAR
async function salvar(){
await setDoc(doc(db,"usuarios",uid),dados);
}

// ENTRAR
window.entrar = async function(){

let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let ref=doc(db,"usuarios",uid);
let snap=await getDoc(ref);

if(snap.exists()){
dados=snap.data();
}else{
dados={nome,xp:0,nivel:1,progresso:{}};
}

await salvar();

menu.innerHTML=`
<h3>${dados.nome}</h3>
<p>⭐ Nível ${dados.nivel} | XP ${dados.xp}</p>

<div class="progress-bar">
<div class="progress" style="width:${(dados.xp/(dados.nivel*100))*100}%"></div>
</div>

${[...Array(12)].map((_,i)=>{
let t="t"+(i+1);
let prev="t"+i;
return `<button onclick="start('${t}')" ${(i>0 && (dados.progresso[prev]||0)<80)?'class="locked"':''}>Lição ${i+1}</button>`;
}).join("")}
`;

carregarRanking();
}

// 🔥 TODAS AS LIÇÕES
let temas = {

t1:[
["Por que muitos procuram a Bíblia?",["Tradição","Respostas da vida","Obrigação"],1],

],

],

],

],

t6:[
["Universo:",["Teve começo","Sempre existiu","Acaso"],0],

],

],

t8:[

],

t9:[

],

t10:[

["Aprender:",["Bíblia","Política","Negócio"],0],

],

t11:[

],

t12:[

["Jeová ajuda:",["Sim","Não","Pouco"],0],
["Prioridade:",["Alta","Baixa","Nada"],0],
["Esforço:",["Vale a pena","Não vale","Tanto faz"],0]
]

};

// QUIZ
let lista=[], atual=0, acertos=0, temaAtual="";

window.start=function(t){
temaAtual=t;
lista=temas[t];
atual=0;
acertos=0;
combo=0;
menu.innerHTML="";
load();
}

function load(){
let q=lista[atual];
quiz.innerHTML=`<h3>${q[0]}</h3><p>🔥 Combo: ${combo}</p>`;
q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="resp(${i},this)">${op}</button>`;
});
}

window.resp=async function(i,btn){

if(i===lista[atual][2]){
combo++;
dados.xp+=10+(combo*2);
acertos++;
btn.classList.add("correct");
somAcerto.play();
}else{
combo=0;
dados.xp=Math.max(0,dados.xp-5);
btn.classList.add("wrong");
somErro.play();
}

atual++;

setTimeout(async()=>{
if(atual<lista.length){
load();
}else{

let pct=Math.round((acertos/lista.length)*100);
dados.progresso[temaAtual]=pct;

if(dados.xp>=dados.nivel*100){
dados.xp=0;
dados.nivel++;
alert("🔥 SUBIU DE NÍVEL!");
}

await salvar();

quiz.innerHTML=`<h2>${pct}%</h2><button onclick="entrar()">Menu</button>`;
}
},500);
}

// RANKING
async function carregarRanking(){
let snap=await getDocs(collection(db,"usuarios"));
let lista=[];
snap.forEach(d=>lista.push(d.data()));
lista.sort((a,b)=>b.nivel - a.nivel || b.xp - a.xp);

ranking.innerHTML="<h3>🏆 Ranking</h3>"+lista.slice(0,5).map(u=>`<p>${u.nome} - Nv ${u.nivel} (${u.xp}xp)</p>`).join("");
}

</script>

</body>
</html>
