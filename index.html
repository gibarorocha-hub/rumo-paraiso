<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumo ao Paraíso</title>
    <style>
        body { font-family: Arial; text-align:center; background:#111; color:#fff; padding: 20px; margin: 0; }
        button { width: 95%; max-width: 400px; margin: 10px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { padding: 15px; border-radius: 8px; width: 80%; max-width: 370px; margin-bottom: 10px; border: none; font-size: 16px; }
        .locked { background: #444 !important; color: #888; cursor: not-allowed; }
        .quiz-btn { background: #2196F3; color: white; }
        .correct { background: #4CAF50 !important; }
        .wrong { background: #F44336 !important; }
        #debug { color: #ff5555; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>📖 Rumo ao Paraíso</h1>

    <div id="loginSection">
        <input id="nomeInput" placeholder="Digite seu nome...">
        <br>
        <button id="btnEntrar" style="background: #4CAF50; color: white;">Entrar</button>
    </div>

    <div id="menuSection" style="display:none;"></div>
    <div id="quizSection" style="display:none;"></div>
    <div id="debug"></div>

    <audio id="somAcerto" src="Aplauso.mp3"></audio>
    <audio id="somErro" src="Vaia.mp3"></audio>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
            authDomain: "://firebaseapp.com",
            projectId: "quiz-biblico-e1362",
            storageBucket: "quiz-biblico-e1362.firebasestorage.app",
            messagingSenderId: "381226315263",
            appId: "1:381226315263:web:0460f78509890632b5003c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let jogadorNome = "";
        let dados = {};

        const temas = {
            t1:[["Segundo João 17:3, o que é essencial?",["Conhecer Deus","Religião","Obras"],0],["Nome de Deus?",["Importante","Não importa","Tradição"],0],["Mudança veio de?",["Aplicar Bíblia","Sorte","Pessoas"],0],["Conhecer Deus exige?",["Esforço","Sorte","Nada"],0],["Só acreditar basta?",["Sim","Não","Depende"],1],["Mudança mostra?",["Conhecimento real","Nada","Religião"],0],["Jesus revelou?",["Deus","Homens","Anjos"],0],["Automático?",["Sim","Não","Talvez"],1],["Aplicar ensinos?",["Aproxima","Nada","Confunde"],0],["Ignorar Deus?",["Problemas","Nada","Sucesso"],0]],
            t2:[["Bíblia vem de?",["Deus","Homens","Reis"],0],["Serve para?",["Ensinar","Confundir","Entreter"],0],["Prova?",["Profecias","Popularidade","Tradição"],0],["Corrige?",["Sim","Não","Pouco"],0],["Ler?",["Sim","Não","Talvez"],0],["Origem?",["Divina","Humana","Mista"],0],["Erra?",["Não","Sim","Às vezes"],0],["Só líderes entendem?",["Sim","Não","Depende"],1],["Ignorar?",["Problemas","Nada","Sucesso"],0],["Ajuda decisões?",["Sim","Não","Pouco"],0]],
            t3:[["Deus quer?",["Felicidade","Riqueza","Fama"],0],["Felicidade vem de?",["Aplicar Bíblia","Dinheiro","Status"],0],["Deus se importa?",["Sim","Não","Pouco"],0],["Felicidade = sem problemas?",["Sim","Não","Talvez"],1],["Deus ajuda?",["Sim","Não","Pouco"],0],["Confiar traz?",["Paz","Nada","Confusão"],0],["Vida sem Deus?",["Vazio","Perfeita","Nada"],0],["Alegria?",["Espiritual","Material","Momentânea"],0],["Aplicar ensinos?",["Felicidade","Nada","Problemas"],0],["Depende de?",["Deus","Sorte","Dinheiro"],0]],
            t4:[["Sofrimento vem de?",["Humanos/Satanás","Deus","Natureza"],0],["Esperança?",["Promessas","Dinheiro","Tempo"],0],["Vai acabar?",["Sim","Não","Talvez"],0],["Deus causa?",["Não","Sim","Sempre"],0],["Deus testa?",["Sim","Não","Depende"],1],["Esperança?",["Real","Falsa","Fraca"],0],["Promessa?",["Fim dor","Nada","Mais dor"],0],["Reagir?",["Confiar","Desistir","Ignorar"],0],["Prova?",["Precisamos Deus","Nada","Erro"],0],["Futuro?",["Melhor","Igual","Pior"],0]],
            t5:[["Jesus é?",["Filho de Deus","Deus","Profeta"],0],["Ensinou?",["Amor","Guerra","Dinheiro"],0],["Veio para?",["Salvar","Dominar","Punir"],0],["Exemplo?",["Obediência","Orgulho","Força"],0],["Jesus é Deus?",["Sim","Não","Depende"],1],["Imitar?",["Sim","Não","Pouco"],0],["Ajudava?",["Sim","Não","Às vezes"],0],["Falou sobre?",["Amor","Ódio","Riqueza"],0],["Seguir leva?",["Vida","Nada","Problemas"],0],["Morreu por?",["Nós","Ele","Ninguém"],0]],
            t6:[["Fé é?",["Confiança","Sentimento","Medo"],0],["Cresce?",["Estudo","Sorte","Dinheiro"],0],["Sem ação?",["Morta","Forte","Completa"],0],["Confiar em?",["Deus","Homens","Nada"],0],["Fé sem prova?",["Sim","Não","Sempre"],1],["Cresce com?",["Prática","Tempo","Acaso"],0],["Ajuda?",["Decisões","Nada","Problemas"],0],["Recompensa?",["Sim","Não","Pouco"],0],["Gera?",["Ação","Nada","Dúvida"],0],["Sem fé?",["Não agrada","Agrada","Talvez"],0]],
            t7:[["Oração é?",["Comunicação com Deus","Ritual","Repetição"],0],["Oração eficaz?",["Sincera","Decorada","Rápida"],0],["Deus ouve?",["Sim","Não","Pouco"],0],["Devemos orar?",["Sempre","Nunca","Às vezes"],0],["Repetir palavras?",["Sim","Não","Depende"],1],["Orar ajuda?",["Aproxima Deus","Nada","Confunde"],0],["Deus responde?",["Sim","Não","Nunca"],0],["Orar por?",["Coisas certas","Qualquer coisa","Nada"],0],["Fé + oração?",["Fortalece","Nada","Diminui"],0],["Sem oração?",["Enfraquece fé","Nada","Melhora"],0]],
            t8:[["Reuniões servem?",["Aprender","Social","Perder tempo"],0],["Benefício?",["Fortalece fé","Nada","Diversão"],0],["Devemos frequentar?",["Sim","Não","Pouco"],0],["Ajuda espiritual?",["Sim","Não","Pouco"],0],["Posso sozinho?",["Sim","Não","Depende"],1],["Companhia espiritual?",["Importante","Não importa","Evitar"],0],["Aprendizado vem de?",["Ensino bíblico","Opiniões","Nada"],0],["Incentivo?",["Sim","Não","Pouco"],0],["Reuniões aproximam?",["De Deus","Nada","Pessoas só"],0],["Faltar sempre?",["Prejudica","Nada","Ajuda"],0]],
            t9:[["Obediência é?",["Importante","Opcional","Pesada"],0],["Resultado?",["Bênçãos","Nada","Problemas"],0],["Deus espera?",["Obediência","Perfeição","Nada"],0],["Obedecer mostra?",["Amor","Medo","Religião"],0],["Obedecer só quando convém?",["Sim","Não","Talvez"],1],["Resultado?",["Problemas","Nada","Sucesso"],0],["Protege?",["Sim","Não","Pouco"],0],["Deus disciplina?",["Sim","Não","Nunca"],0],["Leva a?",["Vida","Nada","Problemas"],0],["Amor envolve?",["Obedecer","Sentir","Falar"],0]],
            t10:[["Moral bíblica?",["Importante","Antiga","Opcional"],0],["Pureza traz?",["Paz","Nada","Problemas"],0],["Devemos evitar?",["Imoralidade","Nada","Tudo"],0],["Pensamentos contam?",["Sim","Não","Pouco"],0],["Só ações importam?",["Sim","Não","Depende"],1],["Pureza protege?",["Sim","Não","Pouco"],0],["Deus vê?",["Tudo","Nada","Pouco"],0],["Escolhas afetam?",["Vida","Nada","Pouco"],0],["Moral leva?",["Felicidade","Nada","Problemas"],0],["Ignorar moral?",["Prejudica","Nada","Ajuda"],0]],
            t11:[["Amor ao próximo?",["Essencial","Opcional","Difícil"],0],["Amar envolve?",["Ação","Palavras","Nada"],0],["Perdoar?",["Importante","Opcional","Difícil"],0],["Deus perdoa?",["Sim","Não","Pouco"],0],["Guardar mágoa ok?",["Sim","Não","Depende"],1],["Amor une?",["Sim","Não","Pouco"],0],["Devemos ajudar?",["Sim","Não","Talvez"],0],["Amor verdadeiro?",["Sacrifício","Palavras","Nada"],0],["Ódio leva a?",["Problemas","Nada","Vitória"],0],["Amor agrada?",["Deus","Homens","Ninguém"],0]],
            t12:[["Futuro prometido?",["Paraíso","Nada","Destruição"],0],["Esperança?",["Vida eterna","Nada","Riqueza"],0],["Deus vai agir?",["Sim","Não","Talvez"],0],["Terra será?",["Melhor","Igual","Pior"],0],["Só alguns viverão?",["Sim","Não","Depende"],1],["Vida eterna?",["Possível","Impossível","Lenda"],0],["Preparação?",["Aprender","Nada","Esperar"],0],["Esperança ajuda?",["Sim","Não","Pouco"],0],["Promessas falham?",["Não","Sim","Às vezes"],0],["Devemos confiar?",["Sim","Não","Talvez"],0]]
        };

        document.getElementById("btnEntrar").onclick = async function() {
            jogadorNome = document.getElementById("nomeInput").value.trim();
            if (!jogadorNome) return alert("Digite seu nome!");

            document.getElementById("debug").innerText = "Conectando...";

            try {
                await auth.signInAnonymously();
                const docRef = db.collection("progresso").doc(jogadorNome);
                const docSnap = await docRef.get();

                if (docSnap.exists) {
                    dados = docSnap.data();
                } else {
                    dados = { nome: jogadorNome, xp: 0 };
                    await docRef.set(dados);
                }

                document.getElementById("loginSection").style.display = "none";
                document.getElementById("menuSection").style.display = "block";
                gerarMenu();
                document.getElementById("debug").innerText = "";
            } catch (e) {
                document.getElementById("debug").innerText = "Erro: " + e.message;
            }
        };

        function gerarMenu() {
            let html = `<h2>Olá, ${jogadorNome}</h2><p>✨ XP: ${dados.xp || 0}</p><hr>`;
            for (let i = 1; i <= 12; i++) {
                let t = "t" + i;
                let block = i > 1 && (dados["t" + (i - 1)] || 0) < 80;
                let pct = dados[t] || 0;
                html += `<button onclick="iniciarQuiz('${t}')" class="${block ? 'locked' : 'quiz-btn'}" ${block ? 'disabled' : ''}>Lição ${i} (${pct}%)</button>`;
            }
            document.getElementById("menuSection").innerHTML = html;
        }

        window.iniciarQuiz = function(t) {
            let atual = 0, acertos = 0, lista = temas[t];
            const quizSec = document.getElementById("quizSection");
            document.getElementById("menuSection").style.display = "none";
            quizSec.style.display = "block";

            const carregar = () => {
                let q = lista[atual];
                let html = `<h2>${q[0]}</h2>`;
                q[1].forEach((op, i) => {
                    html += `<button onclick="checar(${i}, this)" class="quiz-btn">${op}</button>`;
                });
                quizSec.innerHTML = html;

                window.checar = async (escolha, btn) => {
                    let correto = lista[atual][2];
                    if (escolha === correto) {
                        acertos++;
                        btn.classList.add("correct");
                        document.getElementById("somAcerto").play().catch(()=>{});
                    } else {
                        btn.classList.add("wrong");
                        document.getElementById("somErro").play().catch(()=>{});
                    }
                    
                    setTimeout(async () => {
                        atual++;
                        if (atual < lista.length) carregar();
                        else {
                            let pct = Math.round((acertos / lista.length) * 100);
                            dados[t] = Math.max(dados[t] || 0, pct);
                            dados.xp = (dados.xp || 0) + (pct >= 80 ? 50 : 10);
                            await db.collection("progresso").doc(jogadorNome).set(dados);
                            quizSec.innerHTML = `<h2>Fim! ${pct}%</h2><button onclick="location.reload()">Menu</button>`;
                        }
                    }, 800);
                };
            };
            carregar();
        };
    </script>
</body>
</html>
