<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Bíblico ULTRA</title>

<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial;}
button{margin:5px;padding:10px;width:90%;max-width:400px;border-radius:8px;}
.timer{color:orange;}
.life{color:red;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>

<script>

// ================= VARIÁVEIS =================
let nome="";
let lista=[], atual=0, pontos=0, vidas=3, tempo=30, timer;
let jogador=1;
let pontosP1=0, pontosP2=0;

// ================= PERGUNTAS =================
let temas={

t1:[
["Por que muitos procuram a Bíblia?",["Tradição","Respostas da vida","Obrigação"],1],
["A Bíblia responde:",["Riqueza","Objetivo da vida","Velhice"],1],
["A Bíblia ajuda com:",["Regras rígidas","Conselhos práticos","Nada"],1],
["A Bíblia é:",["Proveitosa","Confusa","Antiga"],0],
["A Bíblia:",["Guia","Opcional","Confunde"],0],
["Perguntar é:",["Importante","Errado","Proibido"],0],
["Estudo leva a:",["Mudança","Nada","Dúvida"],0],
["Mateus 7:7:",["Buscar","Esperar","Ignorar"],0],
["Romanos 15:4:",["Esperança","Medo","Dúvida"],0],
["Entender exige:",["Ajuda","Sorte","Nada"],0]
]

// replica até 12
};
for(let i=2;i<=12;i++){temas["t"+i]=temas.t1;}

// ================= ENTRAR =================
function entrar(){
nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

menu.innerHTML=`
<h3>${nome}</h3>
<button onclick="solo()">🎯 Solo</button>
<button onclick="multi()">👥 Multiplayer (2 jogadores)</button>
`;
}

// ================= GERAR =================
function gerar(){
let todas=[];
Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

// ================= SOLO =================
function solo(){
lista=gerar();
atual=0;
pontos=0;
vidas=3;
carregar();
}

// ================= MULTI =================
function multi(){
lista=gerar();
atual=0;
jogador=1;
pontosP1=0;
pontosP2=0;
vidas=3;
carregarMulti();
}

// ================= TIMER =================
function iniciarTempo(){
tempo=30;
clearInterval(timer);
timer=setInterval(()=>{
tempo--;
document.getElementById("tempo").innerText=tempo;
if(tempo<=0) errar();
},1000);
}

// ================= SOLO LOAD =================
function carregar(){
let q=lista[atual];

quiz.innerHTML=`
<h3>${q[0]}</h3>
<p class="timer">⏱ <span id="tempo">30</span></p>
<p class="life">❤️ ${vidas}</p>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="responder(${i})">${op}</button>`;
});

iniciarTempo();
}

function responder(i){
clearInterval(timer);

if(i===lista[atual][2]) pontos+=10;
else return errar();

atual++;
proxima(carregar);
}

// ================= MULTI LOAD =================
function carregarMulti(){
let q=lista[atual];

quiz.innerHTML=`
<h3>Jogador ${jogador}</h3>
<h3>${q[0]}</h3>
<p class="timer">⏱ <span id="tempo">30</span></p>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="responderMulti(${i})">${op}</button>`;
});

iniciarTempo();
}

function responderMulti(i){
clearInterval(timer);

if(i===lista[atual][2]){
if(jogador===1) pontosP1+=10;
else pontosP2+=10;
}

jogador = jogador===1?2:1;
atual++;

proxima(carregarMulti);
}

// ================= CONTROLE =================
function errar(){
vidas--;
if(vidas<=0) return fim();
atual++;
proxima(carregar);
}

function proxima(fn){
setTimeout(()=>{
if(atual<lista.length) fn();
else fim();
},300);
}

// ================= FIM =================
function fim(){

if(jogador){
quiz.innerHTML=`
<h2>Resultado</h2>
<p>Jogador 1: ${pontosP1}</p>
<p>Jogador 2: ${pontosP2}</p>
<button onclick="entrar()">Menu</button>
`;
}else{
quiz.innerHTML=`
<h2>Pontos: ${pontos}</h2>
<button onclick="entrar()">Menu</button>
`;
}

}

</script>
</body>
</html>
