<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Teste</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial}
button{margin:10px;padding:10px;border-radius:10px}
</style>
</head>
<body>

<h1>Quiz Bíblico</h1>

<input id="nome" placeholder="Nome"><br>
<button onclick="entrar()">Entrar</button>

<div id="menu" style="display:none;">
<button onclick="start()">Lição 1</button>
</div>

<div id="quiz" style="display:none;">
<h2 id="q"></h2>
<div id="opts"></div>
</div>

<script>

// ELEMENTOS
const nomeInput = document.getElementById("nome");
const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");
const qEl = document.getElementById("q");
const opts = document.getElementById("opts");

// PERGUNTAS
let perguntas = [
["Quem criou tudo?",["Deus","Homem","Natureza"],0],
["O que leva à vida eterna?",["Conhecer a Deus","Dinheiro","Sorte"],0]
];

let atual=0;

// LOGIN
function entrar(){
if(!nomeInput.value) return alert("Digite o nome");
menu.style.display="block";
}

// START
function start(){
menu.style.display="none";
quiz.style.display="block";
atual=0;
load();
}

// LOAD
function load(){
let q = perguntas[atual];
qEl.innerText=q[0];

let html="";
q[1].forEach((op,i)=>{
html+=`<button onclick="resp(${i})">${op}</button>`;
});

opts.innerHTML=html;
}

// RESP
function resp(i){
alert("Funcionou 👍");
}

</script>

</body>
</html>
