<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumo ao Paraíso</title>
    <style>
        body { font-family: Arial; text-align:center; background:#111; color:#fff; padding: 20px; }
        button { width: 90%; max-width: 400px; margin: 10px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { padding: 15px; border-radius: 8px; width: 80%; max-width: 370px; margin-bottom: 10px; border: none; font-size: 16px; color: #000; }
        .locked { background: #444 !important; color: #888; cursor: not-allowed; }
        .quiz-btn { background: #2196F3; color: white; }
        .correct { background: #4CAF50 !important; }
        .wrong { background: #F44336 !important; }
        #debug { color: red; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>📖 Rumo ao Paraíso</h1>

    <div id="loginSection">
        <input id="nomeInput" placeholder="Seu nome...">
        <button onclick="entrar()" style="background: #4CAF50; color: white;">Entrar</button>
    </div>

    <div id="menuSection" style="display:none;"></div>
    <div id="quizSection" style="display:none;"></div>
    
    <div id="debug"></div>

    <!-- Scripts do Firebase (Versão Compatível) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // CONFIGURAÇÃO DO SEU PROJETO
        const firebaseConfig = {
            apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
            authDomain: "://firebaseapp.com",
            projectId: "quiz-biblico-e1362",
            storageBucket: "quiz-biblico-e1362.firebasestorage.app",
            messagingSenderId: "381226315263",
            appId: "1:381226315263:web:0460f78509890632b5003c"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let jogadorNome = "";
        let dados = {};

        // LIÇÕES
        const temas = {
            t1:[["Segundo João 17:3, o que é essencial?",["Conhecer Deus","Religião","Obras"],0],["Nome de Deus?",["Importante","Não importa","Tradição"],0]],
            t2:[["Bíblia vem de?",["Deus","Homens","Reis"],0],["Serve para?",["Ensinar","Confundir","Entreter"],0]]
            // Adicione as outras conforme o padrão
        };

        async function entrar() {
            const input = document.getElementById("nomeInput");
            jogadorNome = input.value.trim();
            const debug = document.getElementById("debug");

            if (!jogadorNome) return alert("Digite seu nome!");

            debug.innerText = "Tentando conectar...";

            try {
                // Login Anônimo
                const user = await auth.signInAnonymously();
                debug.innerText = "Autenticado! Buscando dados...";

                // Busca ou cria o progresso do jogador
                const docRef = db.collection("progresso").doc(jogadorNome);
                const docSnap = await docRef.get();

                if (docSnap.exists) {
                    dados = docSnap.data();
                } else {
                    dados = { nome: jogadorNome, xp: 0 };
                    await docRef.set(dados);
                }

                document.getElementById("loginSection").style.display = "none";
                document.getElementById("menuSection").style.display = "block";
                gerarMenu();
                debug.innerText = "";
            } catch (error) {
                console.error(error);
                debug.innerText = "ERRO: " + error.message;
                alert("Erro ao entrar: " + error.message);
            }
        }

        function gerarMenu() {
            let html = `<h2>Olá, ${jogadorNome}</h2><p>✨ XP: ${dados.xp || 0}</p><hr>`;
            for (let i = 1; i <= 12; i++) {
                let t = "t" + i;
                let block = i > 1 && (dados["t" + (i - 1)] || 0) < 80;
                html += `<button onclick="iniciarQuiz('${t}')" class="${block ? 'locked' : 'quiz-btn'}" ${block ? 'disabled' : ''}>Lição ${i} (${dados[t] || 0}%)</button>`;
            }
            document.getElementById("menuSection").innerHTML = html;
        }

        window.iniciarQuiz = (t) => {
            let atual = 0;
            let acertos = 0;
            let lista = temas[t] || [["Lição em breve!",["Voltar"],0]];

            const quizSec = document.getElementById("quizSection");
            document.getElementById("menuSection").style.display = "none";
            quizSec.style.display = "block";

            const carregar = () => {
                let q = lista[atual];
                let html = `<h2>${q[0]}</h2>`;
                q[1].forEach((op, i) => {
                    html += `<button onclick="checar(${i})" class="quiz-btn">${op}</button>`;
                });
                quizSec.innerHTML = html;

                window.checar = async (escolha) => {
                    if (escolha === q[2]) acertos++;
                    atual++;
                    if (atual < lista.length) carregar();
                    else {
                        let pct = Math.round((acertos / lista.length) * 100);
                        dados[t] = Math.max(dados[t] || 0, pct);
                        dados.xp = (dados.xp || 0) + (pct >= 80 ? 50 : 10);
                        await db.collection("progresso").doc(jogadorNome).set(dados);
                        quizSec.innerHTML = `<h2>${pct}%</h2><button onclick="location.reload()">Menu</button>`;
                    }
                };
            };
            carregar();
        };
    </script>
</body>
</html>
