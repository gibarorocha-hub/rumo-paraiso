// ================= ENTRAR =================

const btnEntrar = document.getElementById("btnEntrar");
const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");

btnEntrar.addEventListener("click", ()=>{
    const nome=document.getElementById("nome").value;
    if(!nome) return alert("Digite seu nome");
    dados.nome=nome;
    menu.innerHTML="";
    criarMenu();
});

function criarMenu(){
    const soloBtn = document.createElement("button");
    soloBtn.textContent="🎯 Solo";
    soloBtn.addEventListener("click", solo);
    menu.appendChild(soloBtn);

    const multiBtn = document.createElement("button");
    multiBtn.textContent="🌍 Multiplayer";
    multiBtn.addEventListener("click", criarSala);
    menu.appendChild(multiBtn);
}

// ================= SOLO =================

function solo(){
    lista=gerarPerguntas();
    atual=0;
    pontos=0;
    vidas=3;
    carregar();
}

function gerarPerguntas(){
    let todas=[];
    Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
    return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

function iniciarTempo(){
    tempo=30;
    clearInterval(timer);
    timer=setInterval(()=>{
        tempo--;
        const tEl=document.getElementById("tempo");
        if(tEl) tEl.textContent=tempo;
        if(tempo<=0){
            errar();
        }
    },1000);
}

function carregar(){
    if(!lista[atual]) return fim();
    const q=lista[atual];
    quiz.innerHTML="";
    const h3=document.createElement("h3");
    h3.textContent=q[0];
    quiz.appendChild(h3);

    const tP=document.createElement("p");
    tP.className="timer";
    tP.innerHTML="⏱ <span id='tempo'>30</span>";
    quiz.appendChild(tP);

    const lP=document.createElement("p");
    lP.className="life";
    lP.textContent="❤️ "+vidas;
    quiz.appendChild(lP);

    q[1].forEach((op,i)=>{
        const btn=document.createElement("button");
        btn.textContent=op;
        btn.addEventListener("click", ()=>responder(i));
        quiz.appendChild(btn);
    });

    iniciarTempo();
}

function responder(i){
    clearInterval(timer);
    if(i===lista[atual][2]){
        pontos+=10;
    }else{
        errar();
        return;
    }
    atual++;
    setTimeout(()=>{
        if(atual<lista.length) carregar();
        else fim();
    },300);
}

function errar(){
    vidas--;
    if(vidas<=0) return fim();
    atual++;
    setTimeout(()=>{
        if(atual<lista.length) carregar();
        else fim();
    },300);
}

function fim(){
    quiz.innerHTML=`<h2>Pontos: ${pontos}</h2>`;
    const btn=document.createElement("button");
    btn.textContent="Menu";
    btn.addEventListener("click", ()=>{menu.innerHTML="";criarMenu();});
    quiz.appendChild(btn);
}

// ================= MULTIPLAYER =================

async function criarSala(){
    codigo=Math.random().toString(36).substring(2,6).toUpperCase();
    await setDoc(doc(db,"salas",codigo),{
        perguntas:gerarPerguntas(),
        atual:0,
        jogadores:{}
    });
    alert("Código da sala: "+codigo);
    entrarSala(codigo);
}

async function entrarSala(c){
    codigo=c || prompt("Código da sala:");
    if(!codigo) return;

    const ref=doc(db,"salas",codigo);

    onSnapshot(ref,(snap)=>{
        const sala=snap.data();
        if(!sala) return alert("Sala não encontrada");
        sala.jogadores[uid]=dados.nome;
        setDoc(ref,sala);

        const q=sala.perguntas[sala.atual];
        if(!q) return fim();

        quiz.innerHTML="";
        const h3=document.createElement("h3");
        h3.textContent=q[0];
        quiz.appendChild(h3);

        q[1].forEach((op,i)=>{
            const btn=document.createElement("button");
            btn.textContent=op;
            btn.addEventListener("click", ()=>respMulti(i));
            quiz.appendChild(btn);
        });
    });
}

async function respMulti(i){
    const ref=doc(db,"salas",codigo);
    const snap=await getDoc(ref);
    const sala=snap.data();
    sala.atual++;
    await setDoc(ref,sala);
}

</script>
