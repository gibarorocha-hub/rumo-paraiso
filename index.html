<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumo ao Paraíso em Família - Quiz</title>
<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; margin:0; padding:20px;}
button { width:90%; max-width:400px; margin:10px; padding:15px; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
.correct { background:green; color:#fff; }
.wrong { background:red; color:#fff; }
.locked { background:#444; color:#888; }
.progress { width:90%; max-width:400px; height:10px; background:#333; margin:auto; border-radius:5px; }
.progress-bar { height:10px; background:lime; width:0%; border-radius:5px; }
input { padding:10px; border-radius:8px; border:none; width:80%; margin:5px; }
</style>
</head>
<body>

<h1 onclick="admin()">📖 Rumo ao Paraíso em Família</h1>

<div id="menu">
<input id="nome" placeholder="Seu nome"><br>
<div id="botoes"></div>
<button onclick="ranking()">🏆 Ranking</button>
</div>

<div id="quiz" class="hidden">
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<h2 id="q"></h2>
<div id="opts"></div>
<button onclick="voltarMenu()">⬅️ Voltar ao Menu</button>
</div>

<audio id="somAcerto" src="Aplauso.mp3"></audio>
<audio id="somErro" src="Vaia.mp3"></audio>

<script>
// ========== SONS ==========
function tocar(tipo){
  let a = document.getElementById(tipo==="acerto"?"somAcerto":"somErro");
  a.currentTime=0; a.play().catch(()=>{});
}

// ========== PERGUNTAS ==========
let temas = {
  t1:[
    ["Segundo João 17:3, o que leva à vida eterna?", ["Conhecer a Deus","Ter dinheiro","Fama"],0],
    ["O que diz Salmos 83:18?", ["Deus se chama Jeová","Deus não tem nome","Existem vários deuses"],0],
    ["Segundo a lição 1, por que conhecer a Deus é importante?", ["Traz vida eterna","Não muda nada","Só curiosidade"],0],
    ["A Bíblia traz o quê para nossa vida?", ["Esperança","Medo","Confusão"],0],
    ["Quem criou tudo segundo a Bíblia?", ["Jeová","Homem","Natureza"],0],
    ["O que ensina a oração?", ["Fé e confiança","Nada","Medo"],0],
    ["Devemos amar a Deus?", ["Sim","Não","Talvez"],0],
    ["Quem é nosso Pai celestial?", ["Jeová","Jesus","Homem"],0],
    ["Importância de estudar a Bíblia?", ["Aprender a verdade","Só curiosidade","Não é importante"],0],
    ["Segundo lição 1 vídeo, qual o objetivo?", ["Seguir Deus","Ser rico","Fama"],0]
  ],
  t2:[
    ["Segundo a lição 2, a Bíblia é o quê?", ["Palavra de Deus","Livro comum","História antiga"],0],
    ["A Bíblia ajuda a fazer o quê?", ["Viver melhor","Errar","Confundir"],0],
    ["Segundo Provérbios 3:5, devemos confiar em quem?", ["Jeová","Nós mesmos","Qualquer pessoa"],0],
    ["Por que devemos ler a Bíblia?", ["Para aprender a verdade","Para passar tempo","Não precisa"],0],
    ["A Bíblia ensina o quê?", ["O caminho certo","Nada útil","Confusão"],0],
    ["Segundo vídeo lição 2, o que fazer?", ["Seguir a Deus","Ignorar","Nada"],0],
    ["Amizade com Deus traz?", ["Alegria","Problemas","Nada"],0],
    ["Seguir mandamentos resulta em?", ["Felicidade","Tristeza","Nada"],0],
    ["Quem é fiel a Deus?", ["Jeová","Ninguém","Todos"],0],
    ["Proteção contra o mal vem de?", ["Bíblia","Nada","Confusão"],0]
  ],
  t3:[
    ["Segundo a lição 3, Deus quer que sejamos como?", ["Felizes","Tristes","Confusos"],0],
    ["O que a amizade com Deus traz?", ["Alegria","Problemas","Nada"],0],
    ["Segundo a Bíblia, devemos fazer o quê?", ["O bem","O mal","Nada"],0],
    ["Deus se importa conosco?", ["Sim","Não","Nunca"],0],
    ["A vida é o quê segundo o livro?", ["Presente de Deus","Acaso","Sem valor"],0],
    ["Segundo vídeo lição 3, o que devemos seguir?", ["Deus","Ninguém","Nada"],0],
    ["Quem é amigo verdadeiro?", ["Jeová","Ninguém","Todos"],0],
    ["Fé significa?", ["Confiar em Deus","Confiar no homem","Nada"],0],
    ["Ajudar os outros?", ["Sim","Não","Nunca"],0],
    ["Oração traz?", ["Força","Nada","Problemas"],0]
  ]
};

// Criar lições t4 até t12 replicando t1 para teste
for(let i=4;i<=12;i++){temas["t"+i]=temas.t1.slice();}

// ========== VARIÁVEIS ==========
let atual=0, acertos=0, lista=[], temaAtual="", jogador="";
let botoes = document.getElementById("botoes");
let quiz = document.getElementById("quiz");
let menu = document.getElementById("menu");
let qEl = document.getElementById("q");
let opts = document.getElementById("opts");
let bar = document.getElementById("bar");

// ========== INICIAR Lição ==========
function start(t){
  jogador = document.getElementById("nome").value || "Anônimo";
  temaAtual = t;
  lista = temas[t];
  atual=0; acertos=0;
  menu.style.display="none";
  quiz.classList.remove("hidden");
  load();
}

// ========== CARREGAR PERGUNTA ==========
function load(){
  let q = lista[atual];
  qEl.innerText = q[0];
  opts.innerHTML = "";
  q[1].forEach((op,i)=>{
    let btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = ()=>resp(i,btn);
    opts.appendChild(btn);
  });
  bar.style.width = ((atual/lista.length)*100)+"%";
}

// ========== RESPONDER ==========
function resp(i,btn){
  let certo = lista[atual][2];
  if(i===certo){acertos++; btn.classList.add("correct"); tocar("acerto");}
  else {btn.classList.add("wrong"); tocar("erro");}
  setTimeout(()=>{
    atual++;
    if(atual<lista.length) load();
    else fim();
  },800);
}

// ========== FINAL ==========
function fim(){
  let pct = Math.round((acertos/lista.length)*100);
  quiz.innerHTML = `<h2>${pct}%</h2><button onclick="voltarMenu()">Menu</button>`;
}

// ========== VOLTAR MENU ==========
function voltarMenu(){
  quiz.classList.add("hidden");
  menu.style.display="block";
}

// ========== GERAR BOTÕES ==========
function gerarBotoes(){
  botoes.innerHTML="";
  for(let i=1;i<=12;i++){
    let t = "t"+i;
    let btn = document.createElement("button");
    btn.innerText = `📚 Lição ${i}`;
    btn.onclick = ()=>start(t);
    botoes.appendChild(btn);
  }
}
gerarBotoes();

// ========== RANKING ==========
function ranking(){
  alert("Ranking temporário: não implementado ainda.");
}

// ========== ADMIN ==========
function admin(){
  alert("Painel de controle não implementado ainda.");
}
</script>
</body>
</html>
