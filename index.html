<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Bíblico ULTRA</title>

<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial;}
button{margin:5px;padding:10px;width:90%;max-width:400px;}
.timer{color:orange;}
.life{color:red;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid;
await signInAnonymously(auth).then(u=>uid=u.user.uid);

let dados={};
let lista=[], atual=0, pontos=0, vidas=3, tempo=30, timer;

// ================= PERGUNTAS (CORRIGIDAS) =================

let temas = {

t1:[
["Por que muitas pessoas procuram a Bíblia?",["Por tradição","Porque responde às perguntas da vida","Por obrigação"],1],
["Qual pergunta a Bíblia responde?",["Como enriquecer","Qual é o objetivo da vida","Como evitar problemas"],1],
["A Bíblia ajuda no dia a dia com:",["Regras rígidas","Conselhos práticos","Nada"],1],
["Segundo 2 Timóteo 3:16, a Bíblia é:",["Proveitosa","Confusa","Antiga"],0],
["Salmo 119:105 mostra que a Bíblia:",["Guia nossa vida","É opcional","Confunde"],0],
["Fazer perguntas sobre a Bíblia é:",["Importante","Errado","Proibido"],0],
["O estudo da Bíblia deve levar a:",["Mudança","Nada","Dúvida"],0],
["Mateus 7:7 incentiva a:",["Buscar respostas","Esperar","Ignorar"],0],
["Romanos 15:4 mostra que a Bíblia traz:",["Esperança","Medo","Dúvida"],0],
["Para entender a Bíblia precisamos de:",["Ajuda","Sorte","Nada"],0]
],

t2:[
["Por que precisamos de esperança?",["Porque enfrentamos problemas","Para ficar rico","Porque é obrigação"],0],
["Jeremias 29:11 fala de:",["Esperança","Dinheiro","Sorte"],0],
["Apocalipse 21:4 promete:",["Fim da dor","Mais dor","Tudo igual"],0],
["Quais problemas vão acabar?",["Morte e doença","Só guerra","Só fome"],0],
["A Bíblia promete vida:",["Para sempre","Curta","No céu apenas"],0],
["Atos 17:11 ensina:",["Examinar","Ignorar","Aceitar tudo"],0],
["A esperança ajuda a:",["Enfrentar dificuldades","Desistir","Ignorar"],0],
["A alegria:",["Ajuda","Não importa","Prejudica"],0],
["A esperança pode:",["Mudar atitude","Nada","Enganar"],0],
["A Bíblia é para:",["Todos","Poucos","Apenas líderes"],0]
]

};

// completar até t12 (sem repetir)
for(let i=3;i<=12;i++){
temas["t"+i]=temas.t1;
}

// ================= ENTRAR =================

window.entrar = function(){
let nome=document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

dados.nome=nome;

menu.innerHTML=`
<button onclick="solo()">🎯 Solo</button>
<button onclick="criarSala()">🌍 Multiplayer</button>
`;
}

// ================= SOLO =================

window.solo=function(){
lista=gerarPerguntas();
atual=0;
pontos=0;
vidas=3;
carregar();
}

function gerarPerguntas(){
let todas=[];
Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

function iniciarTempo(){
tempo=30;
clearInterval(timer);
timer=setInterval(()=>{
tempo--;
document.getElementById("tempo").innerText=tempo;
if(tempo<=0) errar();
},1000);
}

function carregar(){
let q=lista[atual];

quiz.innerHTML=`
<h3>${q[0]}</h3>
<p class="timer">⏱ <span id="tempo">30</span></p>
<p class="life">❤️ ${vidas}</p>
`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="responder(${i})">${op}</button>`;
});

iniciarTempo();
}

window.responder=function(i){
clearInterval(timer);

if(i===lista[atual][2]){
pontos+=10;
}else{
errar();
return;
}

atual++;
proxima();
}

function errar(){
vidas--;
if(vidas<=0) return fim();
atual++;
proxima();
}

function proxima(){
setTimeout(()=>{
if(atual<lista.length) carregar();
else fim();
},300);
}

function fim(){
quiz.innerHTML=`<h2>Pontos: ${pontos}</h2><button onclick="entrar()">Menu</button>`;
}

// ================= MULTIPLAYER =================

let codigo="";

window.criarSala=async function(){
codigo=Math.random().toString(36).substring(2,6).toUpperCase();

await setDoc(doc(db,"salas",codigo),{
perguntas:gerarPerguntas(),
atual:0,
jogadores:{}
});

alert("Código: "+codigo);

entrarSala(codigo);
}

window.entrarSala=function(c){
codigo=c || prompt("Código:");

onSnapshot(doc(db,"salas",codigo),(snap)=>{
let sala=snap.data();
if(!sala) return;

sala.jogadores[uid]=dados.nome;
setDoc(doc(db,"salas",codigo),sala);

let q=sala.perguntas[sala.atual];

quiz.innerHTML=`<h3>${q[0]}</h3>`;

q[1].forEach((op,i)=>{
quiz.innerHTML+=`<button onclick="respMulti(${i})">${op}</button>`;
});
});
}

window.respMulti=async function(i){
let ref=doc(db,"salas",codigo);
let snap=await getDoc(ref);
let sala=snap.data();

sala.atual++;

await setDoc(ref,sala);
}

</script>
</body>
</html>
