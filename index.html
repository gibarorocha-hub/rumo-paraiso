<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Clique</title>
</head>

<body style="text-align:center; background:#111; color:#fff; font-family:Arial;">

<h2>Teste Clique</h2>

<input id="nome" placeholder="Digite seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="msg"></div>

<script>

window.entrar = function(){

alert("clicou"); // 👈 TESTE PRINCIPAL

let nome = document.getElementById("nome").value;

if(!nome){
alert("Digite nome");
return;
}

document.getElementById("msg").innerHTML = "FUNCIONANDO ATÉ AQUI";

}

</script>

</body>
</html>
