<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Firebase</title>
</head>

<body style="text-align:center; background:#111; color:#fff; font-family:Arial;">

<h2>Teste Firebase</h2>

<input id="nome" placeholder="Digite seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="msg"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 SEU CONFIG (JÁ COLOCADO)
const firebaseConfig = {
  apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
  authDomain: "quiz-biblico-e1362.firebaseapp.com",
  projectId: "quiz-biblico-e1362"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// login anônimo
const user = await signInAnonymously(auth);
const uid = user.user.uid;

window.entrar = async function(){

alert("clicou"); // teste

let nome = document.getElementById("nome").value;

if(!nome){
alert("Digite nome");
return;
}

await setDoc(doc(db,"usuarios",uid),{
nome: nome,
teste: "ok"
});

document.getElementById("msg").innerHTML = "SALVO NO FIREBASE ✅";

}

</script>

</body>
</html>
