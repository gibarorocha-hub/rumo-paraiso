<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico MASTER</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; margin:0; padding:20px; }
button { width:90%; max-width:400px; margin:10px; padding:15px; border:none; border-radius:10px; font-size:16px; cursor:pointer; }
.correct { background:green; color:#fff; }
.wrong { background:red; color:#fff; }
.locked { background:#444; color:#888; }
.progress { width:90%; max-width:400px; height:10px; background:#333; margin:auto; border-radius:5px; }
.progress-bar { height:10px; background:lime; width:0%; border-radius:5px; }
input { padding:10px; border-radius:8px; border:none; width:80%; margin:5px; }
canvas { max-width:90%; margin:auto; }
</style>
</head>
<body>

<h1 onclick="adminClick()">📖 Quiz Bíblico MASTER</h1>

<div id="loginBox">
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar conta</button>
<button onclick="recuperarSenha()">🔑 Esqueci a senha</button>
</div>

<div id="menu" style="display:none;">
<p id="userText"></p>
<button onclick="sair()">Sair</button>
<div id="botoes"></div>
<button onclick="ranking()">🏆 Ranking Geral</button>
</div>

<div id="quiz" style="display:none;">
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<h2 id="q"></h2>
<div id="opts"></div>
<button onclick="voltarMenu()">⬅️ Voltar ao Menu</button>
<p id="f"></p>
</div>

<div id="adminPanel" style="display:none;">
<h2>📊 ADMIN MASTER</h2>
<div id="dados"></div>
<canvas id="grafico"></canvas>
<button onclick="location.reload()">Voltar</button>
</div>

<audio id="somAcerto" src="Aplauso.mp3"></audio>
<audio id="somErro" src="Vaia.mp3"></audio>

<script type="module">
// ================== FIREBASE ==================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
authDomain: "quiz-biblico-e1362.firebaseapp.com",
projectId: "quiz-biblico-e1362"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ================== ELEMENTOS ==================
let qEl = document.getElementById("q");
let opts = document.getElementById("opts");
let bar = document.getElementById("bar");
let jogador="";

// ================== LOGIN ==================
window.cadastrar = async ()=>{
    try{
        await createUserWithEmailAndPassword(auth,email.value.trim(),senha.value.trim());
        alert("Conta criada com sucesso!");
    }catch(e){alert(e.message);}
};
window.login = async ()=>{
    try{await signInWithEmailAndPassword(auth,email.value.trim(),senha.value.trim());}catch(e){alert(e.message);}
};
window.sair = ()=>signOut(auth);
window.recuperarSenha = async ()=>{
    try{await sendPasswordResetEmail(auth,email.value.trim()); alert("Email de recuperação enviado!");}
    catch(e){alert(e.message);}
};

// ================== USUÁRIO ==================
onAuthStateChanged(auth,user=>{
if(user){
    jogador=user.email;
    loginBox.style.display="none";
    menu.style.display="block";
    userText.innerText=jogador;
    gerarBotoes();
}else{
    loginBox.style.display="block";
    menu.style.display="none";
}
});

// ================== SOM ==================
function tocar(t){let a=document.getElementById(t==="acerto"?"somAcerto":"somErro");a.currentTime=0;a.play().catch(()=>{});}
function voltarMenu(){quiz.style.display="none"; menu.style.display="block";}

// ================== PERGUNTAS ==================
let temas = {
t1:[["Quem criou tudo?",["Deus","Homem","Natureza"],0],
["Salmo 83:18, nome de Deus?",["Jeová","Deus","Senhor"],0],
["Objetivo de conhecer a Deus?",["Vida eterna","Dinheiro","Fama"],0],
["A Bíblia é?",["Palavra de Deus","Livro comum","História antiga"],0],
["Lição 1 vídeo",["Amar a Deus","Ignorar","Nada"],0],
["João 17:3, vida eterna?",["Conhecer a Deus","Ter dinheiro","Fama"],0],
["Quem criou o homem?",["Jeová","Natureza","Homem"],0],
["A Bíblia nos dá?",["Esperança","Confusão","Medo"],0],
["Importância da oração?",["Fortalecer fé","Nada","Problemas"],0],
["Deus se importa?",["Sim","Não","Nunca"],0]],
// Para economizar espaço, lições t2 até t12 podem ser preenchidas da mesma forma (10 perguntas cada)
t2:[["Bíblia é?",["Palavra de Deus","Livro comum","História antiga"],0],["A Bíblia ajuda a?",["Viver melhor","Errar","Confundir"],0],["Provérbios 3:5, confiar em?",["Jeová","Nós mesmos","Qualquer pessoa"],0],["Por que ler a Bíblia?",["Para aprender a verdade","Para passar tempo","Não precisa"],0],["Bíblia ensina?",["O caminho certo","Nada útil","Confusão"],0],["Vídeo lição 2",["Obedecer a Deus","Ignorar","Nada"],0],["Amizade com Deus ajuda?",["Alegria","Problemas","Nada"],0],["Seguir mandamentos?",["Sim","Não","Nunca"],0],["Quem é fiel?",["Jeová","Ninguém","Todos"],0],["Proteção do mal?",["Bíblia","Nada","Confusão"],0]],
t3:[["Deus quer que sejamos?",["Felizes","Tristes","Confusos"],0],["Amizade com Deus traz?",["Alegria","Problemas","Nada"],0],["Devemos fazer o quê?",["O bem","O mal","Nada"],0],["Deus se importa?",["Sim","Não","Nunca"],0],["Vida é?",["Presente de Deus","Acaso","Sem valor"],0],["Vídeo lição 3",["Seguir a Deus","Ignorar","Nada"],0],["Quem é amigo verdadeiro?",["Jeová","Ninguém","Todos"],0],["Fé significa?",["Confiar em Deus","Confiar no homem","Nada"],0],["Ajudar os outros?",["Sim","Não","Nunca"],0],["O que dá força?",["Oração","Nada","Problemas"],0]],
// t4 até t12 podem ser replicadas usando o mesmo modelo, depois você só preenche com as perguntas reais do livro e vídeos
};

// ================== QUIZ ==================
let atual=0, acertos=0, temaAtual="";

async function getProgresso(){let ref=doc(db,"progresso",jogador);let snap=await getDoc(ref);return snap.exists()?snap.data():{}}
async function salvarProgresso(tema,pct){let ref=doc(db,"progresso",jogador);let dados=await getProgresso();dados[tema]=pct;await setDoc(ref,dados);}

async function gerarBotoes(){
let prog=await getProgresso();
let html="";
for(let i=1;i<=12;i++){
    let t="t"+i;
    let prev=prog["t"+(i-1)]||0;
    if(i>1 && prev<80){html+=`<button class="locked">🔒 Lição ${i}</button>`;}
    else{html+=`<button onclick="start('${t}')">📚 Lição ${i}</button>`;}
}
botoes.innerHTML=html;
}

window.start=t=>{
temaAtual=t;
lista=temas[t]||temas.t1;
atual=0; acertos=0;
menu.style.display="none";
quiz.style.display="block";
load();
}

function load(){
let q=lista[atual];
qEl.innerText=q[0];
opts.innerHTML="";
q[1].forEach((op,i)=>{
let btn=document.createElement("button");
btn.innerText=op;
btn.onclick=()=>resp(i,btn);
opts.appendChild(btn);
});
bar.style.width=((atual/lista.length)*100)+"%";
}

window.resp=(i,btn)=>{
let certo=lista[atual][2];
if(i===certo){acertos++; btn.classList.add("correct"); tocar("acerto");} 
else {btn.classList.add("wrong"); tocar("erro");}
setTimeout(()=>{
    atual++;
    if(atual<lista.length) load();
    else fim();
},800);
}

async function fim(){
let pct=Math.round((acertos/lista.length)*100);
await salvarProgresso(temaAtual,pct);
await addDoc(collection(db,"ranking"),{nome:jogador,tema:temaAtual,pontos:pct,data:new Date().toLocaleString()});
quiz.innerHTML=`<h2>${pct}%</h2><button onclick="location.reload()">Menu</button>`;
}

// ================== RANKING ==================
window.ranking=async()=>{
let snap=await getDocs(collection(db,"progresso"));
let listaR=[];
snap.forEach(d=>{let data=d.data();let soma=0,cont=0; for(let i=1;i<=12;i++){if(data["t"+i]){soma+=data["t"+i];cont++;}} listaR.push({nome:d.id,media:cont?soma/cont:0});});
listaR.sort((a,b)=>b.media-a.media);
let html="<h2>🏆 Ranking Geral</h2>";
listaR.forEach(r=>{html+=`<p>${r.nome} - ${Math.round(r.media)}%</p>`;});
html+="<button onclick='location.reload()'>Voltar</button>";
menu.innerHTML=html;
}

// ================== ADMIN ==================
let clicks=0;
window.adminClick=()=>{clicks++; if(clicks>=5) abrirAdmin();}
async function abrirAdmin(){
menu.style.display="none";
adminPanel.style.display="block";
let snap=await getDocs(collection(db,"progresso"));
let html="";
snap.forEach(docu=>{html+=`<button onclick="verUsuario('${docu.id}')">${docu.id}</button>`;});
dados.innerHTML=html;
}

window.verUsuario=async(user)=>{
let ref=doc(db,"progresso",user);
let snap=await getDoc(ref);
let data=snap.data();
let labels=[],valores=[];
for(let i=1;i<=12;i++){labels.push("L"+i); valores.push(data["t"+i]||0);}
new Chart(document.getElementById("grafico"),{type:'bar',data:{labels:labels,datasets:[{label:user,data:valores}]}});

dados.innerHTML+=`<br><button onclick="liberar('${user}')">🔓 Liberar tudo</button>`;
}

window.liberar=async(user)=>{
let ref=doc(db,"progresso",user);
let dados={}; for(let i=1;i<=12;i++){dados["t"+i]=100;}
await setDoc(ref,dados);
alert("Liberado!");
}

</script>
</body>
</html>
