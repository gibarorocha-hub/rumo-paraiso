<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Bíblico ULTRA</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial;}
button{margin:5px;padding:10px;width:90%;max-width:400px;border-radius:10px;}
.timer{color:orange;}
.life{color:red;}
.correct{background:green;color:#fff;}
.wrong{background:red;color:#fff;}
</style>
</head>
<body>

<h2>📖 Quiz Bíblico ULTRA</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button id="btnEntrar">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>

<audio id="somAcerto" src="Aplauso.mp3"></audio>
<audio id="somErro" src="Vaia.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
});

const db = getFirestore(app);
const auth = getAuth(app);

let uid;
await signInAnonymously(auth).then(u=>uid=u.user.uid);

const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");

let dados={};
let lista=[], atual=0, pontos=0, vidas=3, tempo=30, timer;
let codigo="";

// ======== PERGUNTAS DOS 12 TEMAS ========
// Aqui você cola todas as perguntas t1 a t12 como antes
let temas = {/* todas as perguntas que você enviou */};

// ======== FUNÇÃO ENTRAR ========
document.getElementById("btnEntrar").onclick = function(){
  let nome = document.getElementById("nome").value.trim();
  if(!nome) return alert("Digite seu nome");
  dados.nome = nome;

  menu.innerHTML = `
    <button onclick="solo()">🎯 Solo</button>
    <button onclick="criarSala()">🌍 Multiplayer</button>
  `;
};

// ======== FUNÇÃO SOLO ========
window.solo = function(){
  lista = gerarPerguntas();
  atual = 0;
  pontos = 0;
  vidas = 3;
  carregar();
};

function gerarPerguntas(){
  let todas = [];
  Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
  return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

function iniciarTempo(){
  tempo = 30;
  clearInterval(timer);
  timer = setInterval(()=>{
    tempo--;
    document.getElementById("tempo").innerText = tempo;
    if(tempo <= 0) errar();
  },1000);
}

function tocarSom(tipo){
  document.getElementById(tipo==="acerto"?"somAcerto":"somErro").play().catch(()=>{});
}

function carregar(){
  let q = lista[atual];
  quiz.innerHTML = `
    <h3>${q[0]}</h3>
    <p class="timer">⏱ <span id="tempo">30</span></p>
    <p class="life">❤️ ${vidas}</p>
  `;
  q[1].forEach((op,i)=>{
    let b = document.createElement("button");
    b.textContent = op;
    b.onclick = ()=>responder(i, b);
    quiz.appendChild(b);
  });
  iniciarTempo();
}

function responder(i, btn){
  clearInterval(timer);
  let certo = lista[atual][2];
  if(i===certo){
    pontos+=10;
    btn.classList.add("correct");
    tocarSom("acerto");
  }else{
    vidas--;
    btn.classList.add("wrong");
    tocarSom("erro");
    if(vidas<=0){return fim();}
  }
  atual++;
  setTimeout(()=>{
    if(atual<lista.length) carregar();
    else fim();
  },500);
}

function errar(){
  vidas--;
  if(vidas<=0){return fim();}
  atual++;
  setTimeout(()=>{if(atual<lista.length) carregar(); else fim();},500);
}

function fim(){
  quiz.innerHTML = `<h2>Pontos: ${pontos}</h2><button onclick="location.reload()">Menu</button>`;
}

// ======== MULTIPLAYER ========
window.criarSala = async function(){
  codigo = Math.random().toString(36).substring(2,6).toUpperCase();
  await setDoc(doc(db,"salas",codigo),{
    perguntas: gerarPerguntas(),
    atual:0,
    jogadores:{[uid]:dados.nome}
  });
  alert("Código da sala: "+codigo);
  entrarSala(codigo);
}

window.entrarSala = function(c){
  codigo = c || prompt("Código:");
  onSnapshot(doc(db,"salas",codigo),(snap)=>{
    let sala = snap.data();
    if(!sala) return alert("Sala não encontrada!");
    sala.jogadores[uid] = dados.nome;
    setDoc(doc(db,"salas",codigo), sala);

    let q = sala.perguntas[sala.atual];
    quiz.innerHTML = `<h3>${q[0]}</h3>`;
    q[1].forEach((op,i)=>{
      let b = document.createElement("button");
      b.textContent = op;
      b.onclick = ()=>respMulti(i);
      quiz.appendChild(b);
    });
  });
}

window.respMulti = async function(i){
  let ref = doc(db,"salas",codigo);
  let snap = await getDoc(ref);
  let sala = snap.data();
  sala.atual++;
  await setDoc(ref,sala);
}
</script>
</body>
</html>
