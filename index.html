// VARIÁVEIS
let atual=0,acertos=0,lista=[],temaAtual="";

// FUNÇÕES
async function getProgresso(){
  let ref=doc(db,"progresso",jogador);
  let snap=await getDoc(ref);
  return snap.exists()?snap.data():{};
}

async function salvarProgresso(tema,pct){
  let ref=doc(db,"progresso",jogador);
  let dados=await getProgresso();
  dados[tema]=pct;
  await setDoc(ref,dados);
}

// BOTÕES
async function gerarBotoes(){
  let prog=await getProgresso();
  let html="";
  for(let i=1;i<=12;i++){
    let t="t"+i;
    let prev=prog["t"+(i-1)]||0;
    let atualScore=prog[t]||0;
    if(i>1 && prev<80) html+=`<button class="locked">🔒 Lição ${i}</button>`;
    else if(atualScore>=80) html+=`<button class="locked">✅ Lição ${i}</button>`;
    else html+=`<button onclick="start('${t}')">📚 Lição ${i}</button>`;
  }
  botoes.innerHTML=html;
}

// START QUIZ
window.start=t=>{
  temaAtual=t;
  lista=temas[t]||temas.t1;
  atual=0; acertos=0;
  menu.style.display="none";
  quiz.style.display="block";
  load();
}

// LOAD
function load(){
  let q=lista[atual];
  qEl.innerText=q[0];
  bar.style.width=((atual/lista.length)*100)+"%";
  let html="";
  q[1].forEach((op,i)=>{ html+=`<button onclick="resp(${i},this)">${op}</button>`; });
  opts.innerHTML=html;
}

// RESPONDER
window.resp=(i,btn)=>{
  let certo=lista[atual][2];
  if(i===certo){ acertos++; btn.classList.add("correct"); f.innerText=ok[Math.random()*3|0]; tocar("acerto"); }
  else{ btn.classList.add("wrong"); f.innerText=no[Math.random()*3|0]; tocar("erro"); }
  setTimeout(()=>{
    f.innerText="";
    atual++;
    if(atual<lista.length) load();
    else fim();
  },1000);
}

// FIM
async function fim(){
  let pct=Math.round((acertos/lista.length)*100);
  await salvarProgresso(temaAtual,pct);
  await addDoc(collection(db,"ranking"),{
    nome:jogador, tema:temaAtual, pontos:pct, data:new Date().toLocaleString()
  });
  quiz.innerHTML=`<h2>${pct}%</h2><button onclick="voltarMenu()">⬅ Menu</button>`;
}

// VOLTAR MENU
window.voltarMenu=()=>{
  quiz.style.display="none";
  menu.style.display="block";
  gerarBotoes();
}

// RANKING
window.ranking=async()=>{
  let snap=await getDocs(collection(db,"ranking"));
  let html
  = "<h2>🏆 Ranking</h2>";
snap.forEach(doc=>{
  let d=doc.data();
  html += `<p>${d.nome} - ${d.tema} - ${d.pontos}%</p>`;
});
html += "<button onclick='location.reload()'>Voltar</button>";
menu.innerHTML = html;
}

async function abrirAdmin(){
  menu.style.display="none";
  adminPanel.style.display="block";

  let snap = await getDocs(collection(db,"progresso"));

  let html = `
    <h3>🔍 Buscar usuário</h3>
    <input id="busca" oninput="filtrar()" placeholder="Digite email">
    <div id="lista"></div>
  `;

  dados.innerHTML = html;

  let listaHTML = "";
  snap.forEach(doc=>{
    let user = doc.id;
    let d = doc.data();
    let prog = "";
    for(let i=1;i<=12;i++){
      prog += `L${i}:${d["t"+i]||0}% | `;
    }
    listaHTML += `
      <div style="border:1px solid #555;margin:10px;padding:10px;">
        <b>${user}</b><br>${prog}
        <br><button onclick="resetar('${user}')">🗑 Resetar</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = listaHTML;
}

// FILTRAR USUÁRIO
window.filtrar=()=>{
  let txt=document.getElementById("busca").value.toLowerCase();
  document.querySelectorAll("#lista div").forEach(d=>{
    d.style.display=d.innerText.toLowerCase().includes(txt)?"block":"none";
  });
}

// RESETAR USUÁRIO
window.resetar=async(user)=>{
  if(!confirm("Resetar usuário?")) return;
  await deleteDoc(doc(db,"progresso",user));
  alert("Resetado!");
  abrirAdmin();
}
