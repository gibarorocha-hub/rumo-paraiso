<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Bíblico ULTRA</title>
<style>
body{background:#111;color:#fff;text-align:center;font-family:Arial;}
button{margin:5px;padding:10px;width:90%;max-width:400px;cursor:pointer;}
.timer{color:orange;}
.life{color:red;}
</style>
</head>

<body>
<h2>📖 Quiz Bíblico ULTRA</h2>
<input id="nome" placeholder="Seu nome"><br><br>
<button id="btnEntrar">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase setup
const app = initializeApp({
 apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
 authDomain: "quiz-biblico-e1362.firebaseapp.com",
 projectId: "quiz-biblico-e1362"
});
const db = getFirestore(app);
const auth = getAuth(app);

let uid;
await signInAnonymously(auth).then(u=>uid=u.user.uid);

let dados = {};
let lista=[], atual=0, pontos=0, vidas=3, tempo=30, timer;
let codigo="";
let modo="";

// ================= PERGUNTAS =================
let temas = {
t1:[
["Por que muitos procuram a Bíblia?",["Tradição","Respostas da vida","Obrigação"],1],
["A Bíblia responde:",["Riqueza","Objetivo da vida","Velhice"],1],
["A Bíblia ajuda com:",["Regras rígidas","Conselhos práticos","Nada"],1],
["2 Timóteo 3:16:",["Proveitosa","Confusa","Antiga"],0],
["Salmo 119:105:",["Guia","Opcional","Confunde"],0],
["Perguntar é:",["Importante","Errado","Proibido"],0],
["Estudo leva a:",["Mudança","Nada","Dúvida"],0],
["Mateus 7:7:",["Buscar","Esperar","Ignorar"],0],
["Romanos 15:4:",["Esperança","Medo","Dúvida"],0],
["Entender exige:",["Ajuda","Sorte","Nada"],0]
],
t2:[
["Precisamos de esperança porque:",["Problemas","Riqueza","Obrigação"],0],
["Jeremias 29:11:",["Esperança","Dinheiro","Sorte"],0],
["Apocalipse 21:4:",["Sem dor","Mais dor","Igual"],0],
["Deixarão de existir:",["Morte","Só guerra","Só fome"],0],
["Viveremos:",["Para sempre","Pouco","No céu apenas"],0],
["Atos 17:11:",["Examinar","Ignorar","Aceitar tudo"],0],
["Esperança ajuda:",["Enfrentar","Desistir","Ignorar"],0],
["Alegria:",["Ajuda","Nada","Prejudica"],0],
["Esperança:",["Muda atitude","Nada","Engana"],0],
["Bíblia é para:",["Todos","Alguns","Poucos"],0]
]
};

// copiar t1 e t2 para t3..t12 só para exemplo (substitua pelas suas perguntas completas)
for(let i=3;i<=12;i++){temas["t"+i]=temas.t1;}

// ================= FUNÇÕES =================
const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");
const btnEntrar = document.getElementById("btnEntrar");

btnEntrar.onclick = () => {
    const nome = document.getElementById("nome").value.trim();
    if(!nome) return alert("Digite seu nome");
    dados.nome = nome;
    mostrarMenu();
}

function mostrarMenu(){
    menu.innerHTML = `
        <button onclick="iniciarSolo()">🎯 Solo</button>
        <button onclick="criarSala()">🌍 Multiplayer</button>
        <button onclick="entrarSalaPrompt()">🔑 Entrar em sala</button>
    `;
    quiz.innerHTML="";
}

// ================ SOLO ===================
function gerarPerguntas(){
    let todas = [];
    Object.values(temas).forEach(t=>t.forEach(p=>todas.push(p)));
    return todas.sort(()=>Math.random()-0.5).slice(0,10);
}

function iniciarSolo(){
    modo="solo";
    lista = gerarPerguntas();
    atual = 0; pontos=0; vidas=3;
    carregarPergunta();
}

function iniciarTempo(){
    tempo=30;
    clearInterval(timer);
    timer = setInterval(()=>{
        tempo--;
        document.getElementById("tempo").innerText = tempo;
        if(tempo<=0) errar();
    },1000);
}

function carregarPergunta(){
    clearInterval(timer);
    const q = lista[atual];
    if(!q) return fim();
    quiz.innerHTML = `
        <h3>${q[0]}</h3>
        <p class="timer">⏱ <span id="tempo">30</span></p>
        <p class="life">❤️ ${vidas}</p>
        <div id="opcoes"></div>
    `;
    const opcoesDiv = document.getElementById("opcoes");
    q[1].forEach((op,i)=>{
        const btn = document.createElement("button");
        btn.innerText = op;
        btn.onclick = ()=>responder(i);
        opcoesDiv.appendChild(btn);
    });
    iniciarTempo();
}

function responder(i){
    clearInterval(timer);
    if(i === lista[atual][2]){
        pontos+=10;
    } else {
        errar();
        return;
    }
    atual++;
    setTimeout(()=>atual<lista.length ? carregarPergunta() : fim(), 200);
}

function errar(){
    vidas--;
    if(vidas<=0){ fim(); return; }
    atual++;
    setTimeout(()=>atual<lista.length ? carregarPergunta() : fim(),200);
}

function fim(){
    clearInterval(timer);
    quiz.innerHTML = `<h2>🎉 Pontos: ${pontos}</h2><button onclick="mostrarMenu()">Menu</button>`;
}

// ================ MULTIPLAYER ===================
async function criarSala(){
    modo="multi";
    codigo = Math.random().toString(36).substring(2,6).toUpperCase();
    const perguntas = gerarPerguntas();
    await setDoc(doc(db,"salas",codigo),{
        perguntas, atual:0, jogadores:{[uid]:dados.nome}
    });
    alert("Sala criada! Código: "+codigo);
    entrarSala(codigo);
}

async function entrarSalaPrompt(){
    const c = prompt("Digite o código da sala:").toUpperCase();
    if(c) entrarSala(c);
}

async function entrarSala(c){
    modo="multi";
    codigo = c;
    const ref = doc(db,"salas",codigo);
    onSnapshot(ref, snap=>{
        const sala = snap.data();
        if(!sala) { quiz.innerHTML="Sala não encontrada"; return; }
        sala.jogadores[uid] = dados.nome;
        updateDoc(ref,{jogadores: sala.jogadores});
        const q = sala.perguntas[sala.atual];
        if(!q){ quiz.innerHTML="<h3>Aguardando próximos passos...</h3>"; return; }
        quiz.innerHTML = `<h3>${q[0]}</h3><div id="opcoes"></div>`;
        const opcoesDiv = document.getElementById("opcoes");
        q[1].forEach((op,i)=>{
            const btn = document.createElement("button");
            btn.innerText = op;
            btn.onclick = ()=>responderMulti(i);
            opcoesDiv.appendChild(btn);
        });
    });
}

async function responderMulti(i){
    const ref = doc(db,"salas",codigo);
    const snap = await getDoc(ref);
    const sala = snap.data();
    if(!sala) return;
    sala.atual++;
    await setDoc(ref,sala);
}

</script>
</body>
</html>
