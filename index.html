// Variáveis globais
let atual=0, acertos=0, lista=[], temaAtual="";

// Função iniciar lição
window.start = (tema) => {
  temaAtual = tema;
  lista = temas[tema] || [];
  atual=0; acertos=0;
  menu.classList.add("hidden");
  quiz.classList.remove("hidden");
  load();
};

// Carregar pergunta
function load(){
  let q = lista[atual];
  qEl = document.getElementById("q");
  opts = document.getElementById("opts");
  qEl.innerText = q[0];
  let html = "";
  q[1].forEach((op,i)=>{
    html += `<button onclick="resp(${i},this)">${op}</button>`;
  });
  opts.innerHTML = html;
  document.getElementById("bar").style.width = `${Math.round((atual/lista.length)*100)}%`;
}

// Resposta
window.resp = (i, btn) => {
  let certo = lista[atual][2];
  if(i===certo){ acertos++; tocar("acerto"); btn.classList.add("correct"); }
  else { tocar("erro"); btn.classList.add("wrong"); }

  setTimeout(()=>{
    atual++;
    if(atual<lista.length) load();
    else fim();
  },800);
}

// Fim da lição
async function fim(){
  let pct = Math.round((acertos/lista.length)*100);
  // Salvar progresso
  let ref = doc(db,"progresso",jogador);
  let dados = (await getDoc(ref)).data() || {};
  dados[temaAtual] = pct;
  await setDoc(ref,dados);
  // Salvar ranking
  await addDoc(collection(db,"ranking"),{
    nome:jogador, tema:temaAtual, pontos:pct, data:new Date().toLocaleString()
  });
  quiz.innerHTML = `<h2>${pct}%</h2><button onclick="location.reload()">Menu</button>`;
}

// Voltar para menu
window.voltar = () => {
  quiz.classList.add("hidden");
  menu.classList.remove("hidden");
};

// Gerar botões de lições
async function gerarBotoes(){
  let ref = doc(db,"progresso",jogador);
  let prog = (await getDoc(ref)).data() || {};
  let html = "";
  for(let i=1;i<=12;i++){
    let t="t"+i;
    let prev = prog["t"+(i-1)]||0;
    if(i>1 && prev<80) html += `<button class="locked">🔒 Lição ${i}</button>`;
    else html += `<button onclick="start('${t}')">📚 Lição ${i}</button>`;
  }
  botoes.innerHTML = html;
}

// Ranking
window.ranking = async () => {
  let snap = await getDocs(collection(db,"progresso"));
  let listaRank = [];
  snap.forEach(doc=>{
    let d = doc.data();
    let soma=0, cont=0;
    for(let i=1;i<=12;i++){ if(d["t"+i]){ soma+=d["t"+i]; cont++; } }
    let media = cont?Math.round(soma/cont):0;
    listaRank.push({nome:doc.id, media});
  });
  listaRank.sort((a,b)=>b.media-a.media);
  let html="<h2>🏆 Ranking Geral</h2>";
  listaRank.forEach(r=>{ html+=`<p>${r.nome} - ${r.media}%</p>` });
  html+="<button onclick='location.reload()'>Voltar</button>";
  menu.innerHTML = html;
}

// Admin
let clicks=0;
window.adminClick=()=>{ clicks++; if(clicks>=5) abrirAdmin(); }
async function abrirAdmin(){
  menu.classList.add("hidden");
  adminPanel.classList.remove("hidden");
  let snap=await getDocs(collection(db,"progresso"));
  let html="";
  snap.forEach(doc=>{ html+=`<button onclick="verUsuario('${doc.id}')">${doc.id}</button>` });
  dados.innerHTML = html;
}
window.verUsuario=async(user)=>{
  let snap = await getDoc(doc(db,"progresso",user));
  let d = snap.data();
  let labels=[], valores=[];
  for(let i=1;i<=12;i++){ labels.push("L"+i); valores.push(d["t"+i]||0); }
  new Chart(document.getElementById("grafico"), { type:'bar', data:{labels, datasets:[{label:user,data:valores}]}});
  dados.innerHTML+=`<br><button onclick="liberar('${user}')">🔓 Liberar tudo</button>`;
}
window.liberar=async(user)=>{
  let ref = doc(db,"progresso",user);
  let dados={}; for(let i=1;i<=12;i++){ dados["t"+i]=100; }
  await setDoc(ref,dados); alert("Liberado!");
}
