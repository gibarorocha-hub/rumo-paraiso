// ---------------- SCRIPT DO QUIZ ----------------

let atual=0, acertos=0, lista=[], temaAtual="";

function tocar(tipo){ let a = document.getElementById(tipo==="acerto"?"somAcerto":"somErro"); a.currentTime=0; a.play().catch(()=>{}); }

function load() {
  let q = lista[atual];
  document.getElementById("q").innerText = q[0];
  let html = "";
  q[1].forEach((op,i)=>{ html += `<button onclick="resp(${i},this)">${op}</button>`; });
  document.getElementById("opts").innerHTML = html;
  let pct = Math.round((atual/lista.length)*100);
  document.getElementById("bar").style.width = pct+"%";
}

function resp(i,btn){
  let certo = lista[atual][2];
  if(i===certo){ acertos++; tocar("acerto"); btn.classList.add("correct"); }
  else{ tocar("erro"); btn.classList.add("wrong"); }
  setTimeout(()=>{
    atual++;
    if(atual<lista.length) load();
    else fim();
  },500);
}

function start(t){
  temaAtual = t;
  lista = temas[t];
  atual=0; acertos=0;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  load();
}

function fim(){
  alert(`Você acertou ${acertos} de ${lista.length}`);
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

function voltarMenu(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}
