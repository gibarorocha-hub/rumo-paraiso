<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rumo ao Paraíso em Família</title>
<style>
body { font-family: Arial; text-align: center; background:#111; color:#fff; }
button { margin:10px; padding:12px; border:none; border-radius:8px; font-size:16px; }
.hidden { display:none; }
</style>
</head>

<body>

<h1>📖 Rumo ao Paraíso em Família</h1>

<div id="menu">
<button onclick="start('t1')">📚 Tema 1</button>
<button onclick="start('t2')">📚 Tema 2</button>
<button onclick="start('t3')">📚 Tema 3</button>
<button onclick="finalMode()">🧠 Modo Final 🔒</button>
</div>

<div id="quiz" class="hidden">
<h2 id="q"></h2>
<div id="opts"></div>
<p id="f"></p>
</div>

<!-- Sons -->
<audio id="acerto" src="https://www.soundjay.com/human/applause-8.mp3"></audio>
<audio id="erro" src="https://www.soundjay.com/human/boo-01.mp3"></audio>

<script>

let temas = {

t1:[
["Quem é o verdadeiro Deus?",["Jeová","Pedro","Paulo"],0],
["Devemos orar a quem?",["Jeová","Anjos","Qualquer um"],0],
["Jeová é um Deus de?",["Confusão","Amor","Desordem"],1],
["Quem criou tudo?",["Jeová","Homem","Natureza"],0],
["Devemos confiar em?",["Jeová","Boatos","Qualquer um"],0],
["Jeová quer que sejamos?",["Felizes","Maus","Confusos"],0],
["Devemos estudar a Bíblia?",["Sim","Não","Talvez"],0],
["A verdade vem de?",["Jeová","Internet","Qualquer um"],0],
["Jeová se importa conosco?",["Sim","Não","Nunca"],0],
["Devemos obedecer a Deus?",["Sim","Não","Talvez"],0]
],

t2:[
["A Bíblia é inspirada por?",["Homens","Jeová","Anjos"],1],
["Qual livro ensina sobre Deus?",["Revista","Bíblia","Jornal"],1],
["A Bíblia é útil para?",["Ensinar","Confundir","Ignorar"],0],
["Devemos ler a Bíblia?",["Sim","Não","Nunca"],0],
["A Bíblia contém?",["Verdades","Mentiras","Erros"],0],
["A palavra de Deus é?",["Confiável","Falsa","Duvidosa"],0],
["Devemos aplicar a Bíblia?",["Sim","Não","Talvez"],0],
["A Bíblia ajuda a?",["Viver bem","Errar","Ignorar"],0],
["A verdade está na?",["Bíblia","Internet","Pessoas"],0],
["Devemos valorizar a Bíblia?",["Sim","Não","Talvez"],0]
],

t3:[
["Jeová quer que sejamos?",["Felizes","Maus","Confusos"],0],
["A oração é falar com?",["Jeová","Amigos","Qualquer um"],0],
["A Bíblia traz?",["Mentiras","Verdade","Dúvidas"],1],
["Jeová se importa?",["Sim","Não","Nunca"],0],
["Devemos obedecer?",["Sim","Não","Talvez"],0],
["Jeová ouve orações?",["Sim","Não","Nunca"],0],
["Devemos fazer o bem?",["Sim","Não","Talvez"],0],
["Jeová é justo?",["Sim","Não","Talvez"],0],
["Devemos confiar em Deus?",["Sim","Não","Talvez"],0],
["A vida eterna é promessa?",["Sim","Não","Talvez"],0]
],

final:[
["Quem é o Deus verdadeiro?",["Jeová","Pedro","Paulo"],0],
["Devemos confiar em quem?",["Jeová","Homens","Sorte"],0],
["A Bíblia traz o que?",["Mentira","Verdade","Confusão"],1],
["Jeová quer que sejamos?",["Felizes","Maus","Confusos"],0],
["Devemos orar?",["Sim","Não","Nunca"],0]
]

};

let atual=0, acertos=0, lista=[], temaAtual="";

function start(t){
temaAtual=t;
lista=temas[t];
atual=0;
acertos=0;
menu.style.display="none";
quiz.classList.remove("hidden");
load();
}

function load(){
let q=lista[atual];
document.getElementById("q").innerText=q[0];
let html="";
q[1].forEach((op,i)=>{
html+=`<button onclick="responder(${i})">${op}</button><br>`;
});
document.getElementById("opts").innerHTML=html;
}

function responder(i){
let certo=lista[atual][2];

if(i===certo){
acertos++;
document.getElementById("f").innerText="🔥 BOA! Tá sabendo!";
document.getElementById("acerto").play();
}else{
let zoeira=[
"💀 Misericórdia… errou feio!",
"😂 Foi na fé e errou!",
"🙏 Bora estudar mais!",
"😈 Vacilou hein!"
];
document.getElementById("f").innerText=zoeira[Math.floor(Math.random()*zoeira.length)];
document.getElementById("erro").play();
}

atual++;

if(atual<lista.length){
setTimeout(()=>{f.innerText="";load()},1500);
}else{
fim();
}
}

function fim(){
let pct=(acertos/lista.length)*100;
localStorage.setItem(temaAtual,pct);

let msg="Você fez "+pct.toFixed(0)+"%";

if(pct>=80){
msg+="\n🔥 Tema concluído!";
}

quiz.innerHTML="<h2>"+msg+"</h2><button onclick='location.reload()'>Voltar</button>";
}

function finalMode(){
let t1=localStorage.getItem("t1")||0;
let t2=localStorage.getItem("t2")||0;
let t3=localStorage.getItem("t3")||0;

if(t1>=80 && t2>=80 && t3>=80){
temaAtual="final";
lista=temas["final"];
atual=0;
acertos=0;
menu.style.display="none";
quiz.classList.remove("hidden");
load();
}else{
alert("🚫 Precisa fazer 80% em todos os temas!");
}
}

</script>

</body>
</html>
