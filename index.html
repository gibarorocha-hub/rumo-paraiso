<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Clique</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { margin:5px; padding:12px; border:none; border-radius:8px; width:90%; max-width:400px;}
</style>
</head>

<body>

<h1>📖 Teste Clique</h1>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>

<script>

window.entrar = function(){

alert("clicou"); // 👈 TESTE

let nome = document.getElementById("nome").value;

if(!nome){
alert("Digite seu nome");
return;
}

document.getElementById("menu").innerHTML = `
<h3>Olá ${nome}</h3>
<button onclick="alert('Quiz funcionando!')">Começar Quiz</button>
`;

}

</script>

</body>
</html>
