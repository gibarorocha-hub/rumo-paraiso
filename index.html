<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { margin:5px; padding:10px; width:90%; max-width:400px; border-radius:8px; border:none;}
.locked{background:#444;color:#888;}
.correct{background:green;}
.wrong{background:red;}
.admin{background:orange;}
</style>
</head>

<body>

<h2>📖 Quiz Bíblico</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu"></div>
<div id="quiz"></div>
<div id="ranking"></div>
<div id="admin"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiOAN7c2ciY4KReeImKs7OhKY1GUTjcvM",
  authDomain: "quiz-biblico-e1362.firebaseapp.com",
  projectId: "quiz-biblico-e1362"
};

const ADMIN_UID = "COLOQUE_SEU_UID_AQUI";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const user = await signInAnonymously(auth);
const uid = user.user.uid;

let dados = {};

async function salvar(){
  await setDoc(doc(db,"usuarios",uid),dados);
}

window.entrar = async function(){

let nome = document.getElementById("nome").value;
if(!nome) return alert("Digite nome");

let ref = doc(db,"usuarios",uid);
let snap = await getDoc(ref);

if(snap.exists()){
dados = snap.data();
}else{
dados = {nome,xp:0,nivel:1,progresso:{}};
await salvar();
}

if(!dados.progresso) dados.progresso = {};

menu.innerHTML = `
<h3>${dados.nome}</h3>
<p>Nível ${dados.nivel} | XP ${dados.xp}</p>

${[...Array(12)].map((_,i)=>{
let t="t"+(i+1);
let prev="t"+i;
return `<button onclick="start('${t}')" ${(i>0 && (dados.progresso[prev]||0)<80)?'class="locked"':''}>Lição ${i+1}</button>`;
}).join("")}

${uid===ADMIN_UID ? `<button class="admin" onclick="painelAdmin()">ADMIN</button>` : ""}
`;

carregarRanking();
}

// PERGUNTAS (leve e otimizado)
let temas = {};

for(let i=1;i<=12;i++){
temas["t"+i]=[
["Segundo João 17:3, o que leva à vida eterna?",["Conhecer a Deus","Dinheiro","Sorte"],0],
["Salmo 37:29 fala sobre:",["Vida eterna na terra","Fim da terra","Só céu"],0],
["O que Tiago 4:8 ensina?",["Deus se aproxima","Nada acontece","Castigo"],0],
["Segundo Provérbios 2:5 precisamos:",["Esforço","Sorte","Ignorar"],0],
["Qual é o caminho correto segundo Mateus 7?",["Apertado","Fácil","Qualquer um"],0],
["O que Hebreus 11:6 diz?",["Fé é essencial","Nada importa","Tudo fácil"],0],
["Romanos 12:2 fala sobre:",["Mudar mente","Seguir mundo","Ignorar"],0],
["João 13:34 ensina:",["Amor","Dinheiro","Poder"],0],
["Eclesiastes 12:13 resume:",["Temer a Deus","Viver livre","Ignorar"],0],
["Aplicar a Bíblia resulta em:",["Melhora gradual","Nada","Piora"],0]
];
}

let lista=[], atual=0, acertos=0, temaAtual="";

window.start = function(t){
temaAtual = t;
lista = temas[t];
atual = 0;
acertos = 0;
menu.innerHTML = "";
load();
}

function load(){
let q = lista[atual];
quiz.innerHTML = `<h3>${q[0]}</h3>`;
q[1].forEach((op,i)=>{
quiz.innerHTML += `<button onclick="resp(${i},this)">${op}</button>`;
});
}

window.resp = async function(i,btn){

if(i===lista[atual][2]){
acertos++;
dados.xp+=10;
btn.classList.add("correct");
}else{
btn.classList.add("wrong");
}

atual++;

setTimeout(async()=>{
if(atual<lista.length){
load();
}else{

let pct = Math.round((acertos/lista.length)*100);
dados.progresso[temaAtual]=pct;

if(dados.xp>=dados.nivel*100){
dados.xp=0;
dados.nivel++;
}

await salvar();

quiz.innerHTML=`<h2>${pct}%</h2><button onclick="entrar()">Menu</button>`;
}
},500);

}

async function carregarRanking(){
let snap = await getDocs(collection(db,"usuarios"));
let lista=[];
snap.forEach(d=>lista.push(d.data()));
lista.sort((a,b)=>b.xp-a.xp);
ranking.innerHTML="<h3>Ranking</h3>"+lista.slice(0,5).map(u=>`<p>${u.nome} - ${u.xp}</p>`).join("");
}

// ADMIN
window.painelAdmin = async function(){

let snap = await getDocs(collection(db,"usuarios"));
let html="<h3>ADMIN</h3>";

snap.forEach(doc=>{
let u=doc.data();
html+=`<p>${u.nome} | XP:${u.xp} | Nível:${u.nivel}</p>`;
});

admin.innerHTML = html;
}

</script>

</body>
</html>
