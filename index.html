<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumo ao Paraíso</title>

<style>
body { font-family: Arial; text-align:center; background:#111; color:#fff; }
button { width:90%; max-width:400px; margin:10px; padding:15px; border:none; border-radius:10px;}
.correct { background:green; }
.wrong { background:red; }
input { padding:10px; border-radius:8px; border:none; width:80%; }
#feedback { margin-top:10px; }
</style>
</head>

<body>

<h1>📖 Rumo ao Paraíso</h1>

<input id="nome" placeholder="Seu nome"><br><br>
<button onclick="entrar()">Entrar</button>

<div id="menu" style="display:none;"></div>

<div id="quiz" style="display:none;">
<h2 id="q"></h2>
<div id="opts"></div>
<p id="feedback"></p>
</div>

<script>

// ELEMENTOS
const qEl = document.getElementById("q");
const opts = document.getElementById("opts");
const menu = document.getElementById("menu");
const quiz = document.getElementById("quiz");
const feedback = document.getElementById("feedback");

let jogador="";

// LOGIN
function entrar(){
jogador=document.getElementById("nome").value;
if(!jogador) return alert("Digite seu nome");
menu.style.display="block";
gerarMenu();
}

// FRASES
function frase(ok){
return ok?["🔥 Excelente","😎 Muito bem","👊 Acertou"]
:["💀 Errou","😬 Quase","😂 Vacilou"];
}

// PERGUNTAS
let temas = {

t1:[
["Segundo João 17:3, o que é essencial para ganhar a vida eterna?",["Apenas acreditar","Conhecer a Deus e Jesus","Ser religioso"],1],
["O que Salmos 83:18 destaca?",["Poder","Nome Jeová","Juízo"],1],
["Conhecer a Deus envolve?",["Memorizar","Relacionamento","Rituais"],1],
["Saber que Deus existe basta?",["Sim","Não","Talvez"],1],
["Qual atitude mostra amizade com Deus?",["Falar","Aplicar","Ouvir"],1],
["O que fortalece amizade com Deus?",["Estudo e oração","Internet","Outros"],0],
["Conhecer Deus muda?",["Nada","Pouco","Tudo"],2],
["Nome de Deus é importante?",["Sim","Não","Tanto faz"],0],
["Conhecer Deus exige?",["Esforço","Sorte","Tempo livre"],0],
["Aplicar ensinos mostra?",["Conhecimento real","Religião","Nada"],0]
],

t2:[
["Quem inspirou a Bíblia?",["Deus","Homens","Reis"],0],
["A Bíblia serve para?",["Ensinar","Confundir","Entreter"],0],
["É confiável?",["Sim","Não","Depende"],0],
["Ajuda a viver?",["Melhor","Igual","Pior"],0],
["Devemos ler?",["Sim","Não","Talvez"],0],
["Origem da Bíblia?",["Divina","Humana","Mista"],0],
["Ela corrige?",["Sim","Não","Às vezes"],0],
["Ela ensina?",["Sim","Não","Pouco"],0],
["Ela guia?",["Sim","Não","Talvez"],0],
["Ignorar Bíblia resulta?",["Problemas","Nada","Melhor"],0]
],

t3:[
["Deus quer que sejamos?",["Felizes","Ricos","Famosos"],0],
["Amizade com Deus traz?",["Alegria","Medo","Nada"],0],
["Devemos fazer?",["Bem","Mal","Nada"],0],
["Deus se importa?",["Sim","Não","Pouco"],0],
["Vida é?",["Presente","Acaso","Nada"],0],
["Felicidade depende?",["Deus","Dinheiro","Sorte"],0],
["Deus ajuda?",["Sim","Não","Pouco"],0],
["Devemos confiar?",["Sim","Não","Talvez"],0],
["Deus observa?",["Sim","Não","Às vezes"],0],
["Deus ama?",["Sim","Não","Pouco"],0]
]

// (já preparado até 12, mas começamos com 3 fortes)

};

// MENU
function gerarMenu(){
let html="";
for(let i=1;i<=3;i++){
html+=`<button onclick="start('t${i}')">Lição ${i}</button>`;
}
menu.innerHTML=html;
}

// QUIZ
let atual=0,acertos=0,lista=[];

function start(t){
lista=temas[t];
atual=0;
acertos=0;
menu.style.display="none";
quiz.style.display="block";
load();
}

function load(){
let q=lista[atual];
qEl.innerText=q[0];

let html="";
q[1].forEach((op,i)=>{
html+=`<button onclick="resp(${i},this)">${op}</button>`;
});
opts.innerHTML=html;
}

function resp(i,btn){
let certo=lista[atual][2];

if(i===certo){
acertos++;
btn.classList.add("correct");
feedback.innerText=frase(true);
}else{
btn.classList.add("wrong");
feedback.innerText=frase(false);
}

setTimeout(()=>{
atual++;
if(atual<lista.length){
feedback.innerText="";
load();
}else{
let pct=Math.round((acertos/lista.length)*100);
quiz.innerHTML=`<h2>${pct}%</h2><button onclick="location.reload()">Menu</button>`;
}
},1000);
}

</script>

</body>
</html>
